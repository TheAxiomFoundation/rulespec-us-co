format: rulespec/v1
module:
  summary: |-
    Colorado's SNAP rule manual gives households an excess shelter deduction
    for allowable monthly shelter costs above 50 percent of SNAP net income
    before the shelter deduction. For households without a member aged 60 or
    older or with a disability, the shelter deduction cap is 744 dollars
    effective October 1, 2025. Households with an aged or disabled member
    receive the uncapped excess shelter deduction. Households in which all individuals are
    experiencing homelessness and are not receiving free shelter throughout the
    month may use a homeless shelter deduction estimate of 198.99 dollars
    effective October 1, 2025 unless higher shelter costs are verified.
  source_verification:
    corpus_citation_path: us-co/regulation/10-ccr-2506-1/4.407.3
imports:
  - us:statutes/7/2012/j
  - us:regulations/7-cfr/273/10
  - us:policies/usda/snap/fy-2026-cola/deductions
rules:
  - name: restates_excess_shelter_cap
    kind: source_relation
    source: 10 CCR 2506-1 section 4.407.3(B)
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/deductions#snap_maximum_excess_shelter_deduction_48_states_dc
      authority: federal
    verification:
      values:
        snap_maximum_excess_shelter_deduction_48_states_dc: 744
  - name: restates_homeless_shelter_deduction
    kind: source_relation
    source: 10 CCR 2506-1 section 4.407.3(C)
    source_relation:
      type: restates
      target: us:policies/usda/snap/fy-2026-cola/deductions#snap_homeless_shelter_deduction
      authority: federal
    verification:
      values:
        snap_homeless_shelter_deduction: 198.99
  - name: snap_allowable_shelter_costs
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: 10 CCR 2506-1 section 4.407.3(C)
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if all_household_members_experiencing_homelessness:
              if homeless_household_free_shelter_all_month: 0
              else:
                  if verified_higher_homeless_shelter_costs:
                      shelter_costs
                  else:
                      if homeless_household_has_shelter_costs:
                          snap_homeless_shelter_deduction
                      else: 0
          else: shelter_costs
  - name: household_entitled_to_excess_medical_deduction
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_household_has_elderly_or_disabled_member
  - name: snap_claimed_homeless_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if all_household_members_experiencing_homelessness and homeless_household_has_shelter_costs and (not homeless_household_free_shelter_all_month) and (not verified_higher_homeless_shelter_costs): snap_homeless_shelter_deduction else: 0
  - name: snap_total_allowable_shelter_expenses
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if snap_claimed_homeless_shelter_deduction > 0: 0 else: snap_allowable_shelter_costs
