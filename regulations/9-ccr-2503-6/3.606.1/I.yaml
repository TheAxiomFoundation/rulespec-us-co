format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
  summary: |-
    To calculate the basic cash assistance amount for an eligible assistance unit: deduct earned income disregards from gross earned income received or expected in the application month; add unearned income received or expected; deduct that total from the grant amount for the household size.
imports:
  - us-co:regulations/9-ccr-2503-6/3.606.1/F#basic_cash_assistance_grant_standard
rules:
  - name: basic_cash_assistance_application_month_earned_income_after_disregards
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-6 § 3.606.1(I)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: Deduct the earned income disregard(s) from the gross earned income, received or expected to be received by members of the assistance unit, in the month of application
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, gross_earned_income_received_or_expected_by_assistance_unit_members_in_application_month - earned_income_disregards_for_assistance_unit_members)

  - name: basic_cash_assistance_application_month_countable_income_for_grant_calculation
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-6 § 3.606.1(I)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: Add to the result from step 1, above, the unearned income received or expected to be received by members of the assistance unit
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          basic_cash_assistance_application_month_earned_income_after_disregards + unearned_income_received_or_expected_by_assistance_unit_members_in_application_month

  - name: basic_cash_assistance_application_month_grant_amount_for_eligible_assistance_unit
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-6 § 3.606.1(I)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: Deduct the total from step 2, above, from the grant amount for the household size.
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-6/3.606.1/F#basic_cash_assistance_grant_standard
              output: basic_cash_assistance_grant_standard
              hash: sha256:0aed913ad5bef3ba6a94bce8eb2c66a917512dfce414d6c7566ebda1afe95d0d
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, basic_cash_assistance_grant_standard - basic_cash_assistance_application_month_countable_income_for_grant_calculation)
