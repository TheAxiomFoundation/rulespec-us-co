              excerpt: "If the client has zero income the following cash payment shall be received based upon those included in the assistance unit."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if client_has_zero_income_for_basic_cash_assistance and basic_cash_assistance_standard_chart_row_supported: basic_cash_assistance_grant_standard else: 0
