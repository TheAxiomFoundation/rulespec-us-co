              excerpt: "If the client has zero income"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          countable_income_for_basic_cash_assistance == zero_income_threshold_for_basic_cash_assistance_cash_payment

  - name: basic_cash_assistance_zero_income_cash_payment
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
