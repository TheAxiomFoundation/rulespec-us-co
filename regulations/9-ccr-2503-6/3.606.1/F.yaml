              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "If the client has zero income the following cash payment shall be received based upon those included in the assistance unit."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if number_of_caretakers_in_assistance_unit == 0:
            basic_cash_assistance_no_caretaker_grant_standard[standard_chart_child_count] + basic_cash_assistance_grant_standard_each_additional_child_amount * standard_chart_additional_child_count
          else: if number_of_caretakers_in_assistance_unit == 1:
            basic_cash_assistance_one_caretaker_grant_standard[standard_chart_child_count] + basic_cash_assistance_grant_standard_each_additional_child_amount * standard_chart_additional_child_count
          else: if number_of_caretakers_in_assistance_unit == 2:
            basic_cash_assistance_two_caretaker_grant_standard[standard_chart_child_count] + basic_cash_assistance_grant_standard_each_additional_child_amount * standard_chart_additional_child_count
          else: 0

  - name: client_has_zero_income_for_basic_cash_assistance
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-6 Section 3.606.1(F)
    metadata:
