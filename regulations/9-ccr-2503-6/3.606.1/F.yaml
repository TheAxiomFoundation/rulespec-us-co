  - name: basic_cash_assistance_need_standard
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-6 Section 3.606.1(F), Colorado Works Standards of Assistance Chart
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "The basic cash assistance grant shall be determined based upon income using the following need standard."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if number_of_caretakers_in_assistance_unit == 0:
            basic_cash_assistance_no_caretaker_need_standard[standard_chart_child_count] + basic_cash_assistance_need_standard_each_additional_child_amount * standard_chart_additional_child_count
          else: if number_of_caretakers_in_assistance_unit == 1:
            basic_cash_assistance_one_caretaker_need_standard[standard_chart_child_count] + basic_cash_assistance_need_standard_each_additional_child_amount * standard_chart_additional_child_count
          else: if number_of_caretakers_in_assistance_unit == 2:
            basic_cash_assistance_two_caretaker_need_standard[standard_chart_child_count] + basic_cash_assistance_need_standard_each_additional_child_amount * standard_chart_additional_child_count
          else: 0

  - name: basic_cash_assistance_grant_standard
    kind: derived
