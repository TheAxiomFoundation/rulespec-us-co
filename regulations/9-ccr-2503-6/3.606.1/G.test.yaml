- name: pregnant parent through pregnancy-ending month receives allowance
  period: 2026-05
  input:
    us-co:regulations/9-ccr-2503-6/3.606.1/G#input.client_is_pregnant_parent: true
    us-co:regulations/9-ccr-2503-6/3.606.1/G#input.month_is_not_after_month_in_which_pregnancy_ends: true
  output:
    us-co:regulations/9-ccr-2503-6/3.606.1/G#basic_cash_assistance_pregnancy_allowance_amount: 10
    us-co:regulations/9-ccr-2503-6/3.606.1/G#basic_cash_assistance_pregnancy_allowance_eligible: holds
    us-co:regulations/9-ccr-2503-6/3.606.1/G#basic_cash_assistance_pregnancy_allowance: 10
- name: nonpregnant client does not receive allowance
  period: 2026-05
  input:
    us-co:regulations/9-ccr-2503-6/3.606.1/G#input.client_is_pregnant_parent: false
    us-co:regulations/9-ccr-2503-6/3.606.1/G#input.month_is_not_after_month_in_which_pregnancy_ends: true
  output:
    us-co:regulations/9-ccr-2503-6/3.606.1/G#basic_cash_assistance_pregnancy_allowance_eligible: not_holds
    us-co:regulations/9-ccr-2503-6/3.606.1/G#basic_cash_assistance_pregnancy_allowance: 0
- name: after pregnancy-ending month allowance no longer applies
  period: 2026-05
  input:
    us-co:regulations/9-ccr-2503-6/3.606.1/G#input.client_is_pregnant_parent: true
    us-co:regulations/9-ccr-2503-6/3.606.1/G#input.month_is_not_after_month_in_which_pregnancy_ends: false
  output:
    us-co:regulations/9-ccr-2503-6/3.606.1/G#basic_cash_assistance_pregnancy_allowance_eligible: not_holds
    us-co:regulations/9-ccr-2503-6/3.606.1/G#basic_cash_assistance_pregnancy_allowance: 0
