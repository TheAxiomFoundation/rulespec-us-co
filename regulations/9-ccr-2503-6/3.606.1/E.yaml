format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
  summary: |-
    Applications received will be certified for six (6) consecutive months beginning the first month the assistance unit is found eligible for basic cash assistance.
    For eligibility and payment, income shall be considered in the month of application and throughout the certification period. This is also true for redetermination and establishing a new certification period going forward. The following calculation shall be used: countable earned income minus applicable earned income disregards, plus countable unearned income.
rules:
  - name: basic_cash_assistance_certification_period_month_count
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-6 § 3.606.1(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "six (6) consecutive months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: income_considered_for_eligibility_and_payment_applies
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-6 § 3.606.1(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "income shall be considered in the month of application and throughout the certification period"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "redetermination and establishing a new certification period going forward"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "ending with the last day of the sixth (6th) month (unless found ineligible)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          month_is_application_month_for_basic_cash_assistance
          or month_is_in_redetermination_new_certification_period
          or (
            certification_period_month_number >= 1
            and certification_period_month_number <= basic_cash_assistance_certification_period_month_count
            and not assistance_unit_found_ineligible
          )
  - name: income_considered_for_eligibility_and_payment
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-6 § 3.606.1(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "countable earned income minus applicable earned income disregards, plus countable unearned income"
          - path: versions[0].formula
            kind: default
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if income_considered_for_eligibility_and_payment_applies: countable_earned_income - applicable_earned_income_disregards + countable_unearned_income else: 0
