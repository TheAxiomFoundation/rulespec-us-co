format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
  summary: |-
    G. Pregnancy Allowance. Pregnant parents are eligible for the basic cash assistance grant plus a ten-dollar ($10.00) pregnancy allowance. The client is eligible for the pregnancy allowance through the month in which the pregnancy ends.
rules:
  - name: basic_cash_assistance_pregnancy_allowance_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-6 § 3.606.1(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "ten-dollar ($10.00) pregnancy allowance"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10

  - name: basic_cash_assistance_pregnancy_allowance_eligible
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-6 § 3.606.1(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "Pregnant parents are eligible"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "through the month in which the pregnancy ends"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          client_is_pregnant_parent
          and month_is_not_after_month_in_which_pregnancy_ends

  - name: basic_cash_assistance_pregnancy_allowance
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-6 § 3.606.1(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "Pregnant parents are eligible for the basic cash assistance grant plus a ten-dollar ($10.00) pregnancy allowance"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: "through the month in which the pregnancy ends"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if basic_cash_assistance_pregnancy_allowance_eligible: basic_cash_assistance_pregnancy_allowance_amount else: 0
