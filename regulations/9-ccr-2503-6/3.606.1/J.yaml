format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
  summary: |-
    J. Reporting of Earned Income. When the assistance unit reports earned income: apply the appropriate earned income disregards to the gross earned income of each employed member of the budgetary unit as described in Section 3.606.2; add the unearned income received by each member of the budgetary unit; compare the total to the need standard for the household size. If the net countable income equals or exceeds the need standard, the assistance unit is not eligible for Colorado Works basic cash assistance.
imports:
  - us-co:regulations/9-ccr-2503-6/3.606.1/F#basic_cash_assistance_need_standard
rules:
  - name: basic_cash_assistance_reported_earned_income_after_disregards
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-6 § 3.606.1(J)(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: Apply the appropriate earned income disregards to the gross earned income of each employed member of the budgetary unit as described in Section 3.606.2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, gross_earned_income_received_by_employed_budgetary_unit_members - earned_income_disregards_under_section_3_606_2_for_employed_budgetary_unit_members)

  - name: basic_cash_assistance_reported_earned_income_net_countable_income
    kind: derived
    entity: TanfUnit
    dtype: Money
    period: Month
    unit: USD
    source: 9 CCR 2503-6 § 3.606.1(J)(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: Add the unearned income received by each member of the budgetary unit
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          basic_cash_assistance_reported_earned_income_after_disregards + unearned_income_received_by_budgetary_unit_members

  - name: basic_cash_assistance_reported_earned_income_requirement_met
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-6 § 3.606.1(J)(3)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: When the assistance unit reports earned income
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.1
              excerpt: If the net countable income equals or exceeds the need standard, the assistance unit is not eligible
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:regulations/9-ccr-2503-6/3.606.1/F#basic_cash_assistance_need_standard
              output: basic_cash_assistance_need_standard
              hash: sha256:0aed913ad5bef3ba6a94bce8eb2c66a917512dfce414d6c7566ebda1afe95d0d
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (not assistance_unit_reports_earned_income)
          or (basic_cash_assistance_reported_earned_income_net_countable_income < basic_cash_assistance_need_standard)
