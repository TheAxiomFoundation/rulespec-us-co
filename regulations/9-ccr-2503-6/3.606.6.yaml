format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
  summary: |-
    Any assistance unit containing an adult may receive Federal TANF grant payments for up to sixty (60) cumulative months. Months in which a partial Colorado Works payment was made due to a sanction shall be counted toward the time limit. Extensions may be granted up to six (6) months for hardship or domestic violence. The county department shall have thirty (30) calendar days after receipt of a request for an extension to make a decision. County departments must enter the client's request into CBMS within ten (10) calendar days. Up to twenty percent (20%) of the Statewide caseload receiving Colorado Works may be granted an extension beyond the sixty (60) month time limit. Any month of receipt of assistance by an adult while living in Indian Country, or a Native Alaskan village where at least fifty percent (50%) of the adults were not employed, shall not be counted.
rules:
  - name: federal_tanf_cumulative_month_limit
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-6 3.606.6(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "up to sixty (60) cumulative months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          60
  - name: extension_maximum_months
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-6 3.606.6(C)(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "An extension may be granted for up to six (6) months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6
  - name: extension_decision_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-6 3.606.6(C)(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "thirty (30) calendar days after the receipt of a request for an extension to make a decision"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          30
  - name: extension_cbms_entry_days
    kind: parameter
    dtype: Count
    source: 9 CCR 2503-6 3.606.6(C)(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "enter the client's request, and the good cause reason for the extension request, into CBMS within ten (10) calendar days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          10
  - name: statewide_extension_allocation_rate
    kind: parameter
    dtype: Rate
    source: 9 CCR 2503-6 3.606.6(G)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "Up to twenty percent (20%) of the Statewide caseload"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.20
  - name: indian_country_unemployment_rate_threshold
    kind: parameter
    dtype: Rate
    source: 9 CCR 2503-6 3.606.6(F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "at least fifty percent (50%) of the adults were not employed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.50
  - name: adult_month_counts_toward_tanf_time_limit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-6 3.606.6(A), (B), (F)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "Each month for which a basic cash assistance grant is received shall be counted ... Months in which a partial Colorado Works payment was made due to a sanction shall be counted ... Any month of receipt of assistance by an adult while living in Indian Country, or a Native Alaskan village where at least fifty percent (50%) of the adults were not employed, shall not be counted"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          adult_is_in_assistance_unit
          and (basic_cash_assistance_grant_received_for_month
               or partial_colorado_works_payment_due_to_sanction_for_month)
          and not adult_lived_in_indian_country_or_qualifying_native_alaskan_village
  - name: assistance_unit_exhausted_federal_tanf_time_limit
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-6 3.606.6(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "received Federal TANF assistance in Colorado or another state as an adult for sixty (60) or more cumulative months"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_unit_contains_adult_with_cumulative_tanf_months_at_or_above_limit
  - name: assistance_unit_eligible_for_extension_consideration
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-6 3.606.6(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "Assistance units that contain disqualified members shall not be eligible for consideration of an extension."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_unit_exhausted_federal_tanf_time_limit
          and not assistance_unit_contains_disqualified_member
  - name: assistance_unit_eligible_for_colorado_works_beyond_time_limit
    kind: derived
    entity: TanfUnit
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-6 3.606.6(C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "shall not be eligible for Colorado Works assistance in Colorado unless the household demonstrates good cause"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assistance_unit_eligible_for_extension_consideration
          and household_demonstrates_good_cause_for_extension
  - name: household_experiencing_hardship
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-6 3.606.6(D)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "A household may be considered to be experiencing a hardship if one or more of the following prevents the adult member(s) of the assistance unit from securing or maintaining employment"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          hardship_factor_prevents_employment
          and (hardship_factor_caretaker_disability
               or hardship_factor_judicial_system_involvement
               or hardship_factor_family_instability
               or hardship_factor_inadequate_child_care
               or hardship_factor_inadequate_housing
               or hardship_factor_inadequate_transportation
               or hardship_factor_inadequate_employment_opportunities
               or hardship_factor_other_listed_on_state_form)
  - name: household_eligible_for_domestic_violence_extension
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: 9 CCR 2503-6 3.606.6(E)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/regulation/9-ccr-2503-6/3.606.6
              excerpt: "Domestic violence extension may be granted when domestic violence problems ... prevent the adult member(s) from participating in work activities or securing employment."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          domestic_violence_problem_present
          and domestic_violence_prevents_work_or_employment
