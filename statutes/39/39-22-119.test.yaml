- name: 2025 resident at income limit receives fifty percent credit and refundable
    excess
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    us-co:statutes/39/39-22-119#input.resident_individual: true
    us-co:statutes/39/39-22-119#input.federal_adjusted_gross_income: 60000
    us-co:statutes/39/39-22-119#input.claims_child_and_dependent_care_expenses_credit_on_federal_return: true
    us-co:statutes/39/39-22-119#input.federal_child_and_dependent_care_expenses_credit_claimed_on_federal_return: 1000
    ? us-co:statutes/39/39-22-119#input.federal_child_and_dependent_care_expenses_credit_allowed_before_federal_tax_liability_limitation
    : 0
    us-co:statutes/39/39-22-119#input.receives_child_care_assistance_from_department_of_early_childhood: false
    ? us-co:statutes/39/39-22-119#input.federal_child_and_dependent_care_expenses_credit_attributable_to_unreimbursed_out_of_pocket_expenses
    : 400
    us-co:statutes/39/39-22-119#input.federal_adjusted_gross_income_limit_before_current_year_inflation_adjustment: 60000
    us-co:statutes/39/39-22-119#input.cumulative_inflation_since_last_federal_adjusted_gross_income_limit_adjustment: 0
    us-co:statutes/39/39-22-119#input.income_taxes_due_under_article_22: 200
  output:
    us-co:statutes/39/39-22-119#applicable_federal_adjusted_gross_income_limit: 60000
    us-co:statutes/39/39-22-119#federal_child_and_dependent_care_credit_base_before_assistance_limitation: 1000
    us-co:statutes/39/39-22-119#federal_child_and_dependent_care_credit_base_after_child_care_assistance_limitation: 1000
    us-co:statutes/39/39-22-119#child_and_dependent_care_expenses_credit_allowed: holds
    us-co:statutes/39/39-22-119#child_and_dependent_care_expenses_credit_before_part_year_apportionment: 500
    us-co:statutes/39/39-22-119#child_and_dependent_care_expenses_credit_refundable_excess_before_part_year_apportionment: 300
