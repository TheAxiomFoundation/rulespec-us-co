format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-119
  summary: |-
    (1.7)(a) For income tax years beginning on and after January 1, 2019, but before January 1, 2026, if a resident individual's federal adjusted gross income is less than or equal to sixty thousand dollars and the individual claims a credit for child and dependent care expenses on the individual's federal tax return ... the credit is an amount equal to fifty percent of the credit ... claimed. (1.7)(b) For income tax years beginning on and after January 1, 2026, except as provided in subsection (1.7)(c), ... the credit is an amount equal to seventy percent of the federal credit allowed ... calculated without regard to the limitation imposed by section 26. (1.7)(c) For income tax years commencing on or after January 1, 2027, the executive director shall adjust the federal adjusted gross income limit ... for inflation ... rounded to the nearest one thousand dollars. (2) excess credit is refunded and not carried forward. (3) The credit is not allowed to an individual receiving child care assistance except to the extent of unreimbursed out-of-pocket expenses that result in a federal credit.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-119/1.3#legislative_findings_and_effectiveness_measurement
      reason: Subsection (1.3) states legislative findings, purpose, and audit measurement metrics rather than an entity-scoped tax computation.
    - output: us-co:statutes/39/39-22-119/4#child_and_dependent_care_expenses_credit_after_part_year_apportionment
      reason: Part-year resident apportionment requires the ratio determined under section 39-22-110(1), which is not provided in the copied context.
      source_values:
        - us-co:statutes/39/39-22-119#child_and_dependent_care_expenses_credit_before_part_year_apportionment
    - output: us-co:statutes/39/39-22-119/10#credit_continues_indefinitely
      reason: Subsection (10) is a continuity and tax-expenditure-review override, not a separate entity-scoped amount, threshold, or eligibility computation.
rules:
  - name: statutory_federal_adjusted_gross_income_limit
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-119(1.7)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: income tax years beginning on and after January 1, 2019
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: federal adjusted gross income is less than or equal to sixty thousand dollars
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          60000

  - name: child_and_dependent_care_credit_percentage
    kind: parameter
    dtype: Rate
    source: 39-22-119(1.7)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: amount equal to fifty percent
          - path: versions[1].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: income tax years beginning on and after January 1, 2026
          - path: versions[1].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: amount equal to seventy percent
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          0.50
      - effective_from: '2026-01-01'
        formula: |-
          0.70

  - name: federal_credit_base_uses_allowed_before_federal_tax_liability_limitation_indicator
    kind: parameter
    dtype: Integer
    source: 39-22-119(1.7)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: before January 1, 2026
          - path: versions[1].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: beginning on and after January 1, 2026
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          0
      - effective_from: '2026-01-01'
        formula: |-
          1

  - name: income_limit_inflation_adjustment_applies_indicator
    kind: parameter
    dtype: Integer
    source: 39-22-119(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: For income tax years commencing on or after January 1, 2027
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          0
      - effective_from: '2027-01-01'
        formula: |-
          1

  - name: income_limit_rounding_increment
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-119(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: rounded to the nearest one thousand dollars
    versions:
      - effective_from: '2027-01-01'
        formula: |-
          1000

  - name: income_limit_adjustment_minimum_increase
    kind: parameter
    dtype: Money
    unit: USD
    source: 39-22-119(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: results in an increase of at least one thousand dollars
    versions:
      - effective_from: '2027-01-01'
        formula: |-
          1000

  - name: rounded_federal_adjusted_gross_income_limit_after_cumulative_inflation
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: cumulative inflation since the last adjustment ... rounded to the nearest one thousand dollars
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          floor(((max(0, federal_adjusted_gross_income_limit_before_current_year_inflation_adjustment) * (1 + cumulative_inflation_since_last_federal_adjusted_gross_income_limit_adjustment)) / income_limit_rounding_increment) + 0.5) * income_limit_rounding_increment

  - name: annual_federal_adjusted_gross_income_limit_after_inflation_adjustment
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: if cumulative inflation since the last adjustment ... results in an increase of at least one thousand dollars
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if rounded_federal_adjusted_gross_income_limit_after_cumulative_inflation - max(0, federal_adjusted_gross_income_limit_before_current_year_inflation_adjustment) >= income_limit_adjustment_minimum_increase: rounded_federal_adjusted_gross_income_limit_after_cumulative_inflation else: max(0, federal_adjusted_gross_income_limit_before_current_year_inflation_adjustment)

  - name: applicable_federal_adjusted_gross_income_limit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119(1.7)(b), 39-22-119(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: federal adjusted gross income is less than or equal to sixty thousand dollars
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: shall adjust the federal adjusted gross income limit
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if income_limit_inflation_adjustment_applies_indicator == 1: annual_federal_adjusted_gross_income_limit_after_inflation_adjustment else: statutory_federal_adjusted_gross_income_limit

  - name: federal_child_and_dependent_care_credit_base_before_assistance_limitation
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119(1.7)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: credit ... claimed on the individual's federal tax return
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: federal credit allowed ... calculated without regard to the limitation imposed by section 26
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if federal_credit_base_uses_allowed_before_federal_tax_liability_limitation_indicator == 1: max(0, federal_child_and_dependent_care_expenses_credit_allowed_before_federal_tax_liability_limitation) else: max(0, federal_child_and_dependent_care_expenses_credit_claimed_on_federal_return)

  - name: federal_child_and_dependent_care_credit_base_after_child_care_assistance_limitation
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: not allowed ... receiving child care assistance ... except to the extent of the taxpayer's unreimbursed out-of-pocket expenses
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if receives_child_care_assistance_from_department_of_early_childhood: min(federal_child_and_dependent_care_credit_base_before_assistance_limitation, max(0, federal_child_and_dependent_care_expenses_credit_attributable_to_unreimbursed_out_of_pocket_expenses)) else: federal_child_and_dependent_care_credit_base_before_assistance_limitation

  - name: child_and_dependent_care_expenses_credit_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-119(1.7)(a)-(b), (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: if a resident individual's federal adjusted gross income is less than or equal to sixty thousand dollars
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: except to the extent of the taxpayer's unreimbursed out-of-pocket expenses
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          resident_individual
          and federal_adjusted_gross_income <= applicable_federal_adjusted_gross_income_limit
          and (
            federal_credit_base_uses_allowed_before_federal_tax_liability_limitation_indicator == 1
            or claims_child_and_dependent_care_expenses_credit_on_federal_return
          )
          and federal_child_and_dependent_care_credit_base_after_child_care_assistance_limitation > 0

  - name: child_and_dependent_care_expenses_credit_before_part_year_apportionment
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119(1.7)(a)-(b), (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: The credit is an amount equal to fifty percent
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: The credit is an amount equal to seventy percent
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if child_and_dependent_care_expenses_credit_allowed: child_and_dependent_care_credit_percentage * federal_child_and_dependent_care_credit_base_after_child_care_assistance_limitation else: 0

  - name: child_and_dependent_care_expenses_credit_refundable_excess_before_part_year_apportionment
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119
              excerpt: exceeds the income taxes due ... must be refunded
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          max(0, child_and_dependent_care_expenses_credit_before_part_year_apportionment - income_taxes_due_under_article_22)
