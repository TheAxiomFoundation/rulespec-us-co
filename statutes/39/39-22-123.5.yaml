        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: amount of the credit allowed under this section that exceeds ...
            income taxes due is refunded
  versions:
  - effective_from: '0001-01-01'
    formula: max(0, regular_federal_return_eitc_branch_before_part_year_apportionment
      - max(0, state_income_taxes_due_under_article_22))
- name: missing_valid_ssn_eitc_branch_refundable_excess
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-123.5(4)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: amount of the credit allowed under this section that exceeds ...
            income taxes due is refunded
  versions:
  - effective_from: '2020-01-01'
    formula: max(0, missing_valid_ssn_eitc_branch_before_part_year_apportionment -
      max(0, state_income_taxes_due_under_article_22))
