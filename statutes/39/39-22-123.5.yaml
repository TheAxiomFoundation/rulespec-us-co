- name: revenue_growth_adjustment_percentage_points
  kind: derived
  entity: Person
  dtype: Rate
  period: Year
  source: 39-22-123.5(c)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: percentage ... is increased as follows if the estimated adjustment
            factor is as follows
  versions:
  - effective_from: '0001-01-01'
    formula: "if revenue_adjustment_regime == 1:\n  if estimated_adjustment_factor\
      \ >= adjustment_factor_threshold_for_single_year_increase: single_year_revenue_growth_percentage_point_increase\
      \ else: 0\nelse:\n  if revenue_adjustment_regime == 2:\n    if estimated_adjustment_factor\
      \ >= adjustment_factor_lower_bound_for_maximum_increase: maximum_revenue_growth_percentage_point_increase\
      \ else: if estimated_adjustment_factor >= adjustment_factor_lower_bound_for_larger_increase:\
      \ larger_revenue_growth_percentage_point_increase else: if estimated_adjustment_factor\
      \ >= adjustment_factor_lower_bound_for_large_increase: large_revenue_growth_percentage_point_increase\
      \ else: if estimated_adjustment_factor >= adjustment_factor_lower_bound_for_moderate_increase:\
      \ moderate_revenue_growth_percentage_point_increase else: if estimated_adjustment_factor\
      \ >= adjustment_factor_lower_bound_for_small_increase: small_revenue_growth_percentage_point_increase\
      \ else: 0\n  else:\n    0"
- name: credit_percentage_after_revenue_adjustment
  kind: derived
  entity: Person
  dtype: Rate
  period: Year
  source: 39-22-123.5(2)(d), (2.5)(e), (3.5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: Except as otherwise provided in subsection (3.5)
  versions:
  - effective_from: '0001-01-01'
    formula: base_credit_percentage + temporary_credit_percentage_increase + revenue_growth_adjustment_percentage_points
- name: regular_federal_return_eitc_branch_before_part_year_apportionment
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-123.5(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: resident individual who claims an earned income tax credit on the
            individual's federal tax return
  versions:
  - effective_from: '0001-01-01'
    formula: 'if resident_individual and claims_earned_income_tax_credit_on_federal_return:
      max(0, federal_earned_income_tax_credit_claimed_on_federal_return) * credit_percentage_after_revenue_adjustment
      else: 0'
- name: missing_valid_ssn_eitc_branch_before_part_year_apportionment
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-123.5(2.5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: would have been allowed, but for the fact that ... do not have
            a social security number that is valid for employment
  versions:
  - effective_from: '2020-01-01'
    formula: 'if resident_individual and federal_eitc_would_be_allowed_but_for_missing_valid_employment_ssn:
      max(0, federal_earned_income_tax_credit_would_have_been_allowed_but_for_missing_valid_employment_ssn)
      * credit_percentage_after_revenue_adjustment else: 0'
- name: regular_federal_return_eitc_branch_refundable_excess
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-123.5(4)
  metadata:
