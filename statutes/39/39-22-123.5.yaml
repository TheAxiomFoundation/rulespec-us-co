format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-123.5
  summary: (1)(h) ... establish a permanent and refundable state earned income tax
    credit for eligible Colorado taxpayers. (2) ... resident individual who claims
    an earned income tax credit on the individual's federal tax return is allowed
    ... ten percent ... twenty percent ... twenty-five percent ... fifty percent ...
    thirty-five percent ... twenty-five percent. (2.5) ... would have been allowed,
    but for the fact that ... do not have a social security number that is valid for
    employment. (3.5)(b)-(c) ... percentage ... is increased ... if the estimated
    adjustment factor is ... (4) The amount of the credit allowed under this section
    that exceeds the resident individual's income taxes due is refunded to the individual.
    (5) In the case of a part-year resident, the credit allowed under this section
    is apportioned in the ratio determined under section 39-22-110 (1). (6) The credit
    allowed under this section is not considered to be income or resources...
  deferred_outputs:
  - output: us-co:statutes/39/39-22-123.5/h#legislative_intent
    reason: Subsection (1)(h) is an intent and purpose clause, not an executable tax
      computation.
  - output: us-co:statutes/39/39-22-123.5/2.7#american_rescue_plan_section_32_n_1_eitc_branch_before_part_year_apportionment
    reason: The branch depends on the federal credit that would have been allowed
      under IRC section 32(n)(1) notwithstanding the ARPA date limitation, and those
      federal mechanics are not provided in the copied context.
  - output: us-co:statutes/39/39-22-123.5/3.5/a/V#estimated_adjustment_factor
    reason: The source states that the executive director calculates the estimated
      adjustment factor according to a formula, but the formula text itself is not
      present in the supplied source; executable rules accept the factor as a boundary
      input.
  - output: us-co:statutes/39/39-22-123.5/5#part_year_resident_apportioned_earned_income_tax_credit
    reason: Part-year resident apportionment requires the ratio determined under section
      39-22-110(1), which is not provided in the copied context.
rules:
- name: base_credit_percentage
  kind: parameter
  dtype: Rate
  source: 39-22-123.5(2), (2.5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: equal to ten percent of the federal credit
      - path: versions[1].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: equal to twenty percent of the federal credit
      - path: versions[2].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: equal to twenty-five percent of the federal credit
      - path: versions[3].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: January 1, 2024, fifty percent
      - path: versions[4].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: January 1, 2025, thirty-five percent
      - path: versions[5].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-123.5
          excerpt: on or after January 1, 2026, twenty-five percent
  versions:
  - effective_from: '0001-01-01'
    formula: '0.10'
  - effective_from: '2022-01-01'
    formula: '0.20'
  - effective_from: '2023-01-01'
    formula: '0.25'
  - effective_from: '2024-01-01'
    formula: '0.50'
  - effective_from: '2025-01-01'
    formula: '0.35'
  - effective_from: '2026-01-01'
    formula: '0.25'
