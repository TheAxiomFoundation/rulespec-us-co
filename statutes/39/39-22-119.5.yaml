format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-119.5
  summary: |-
    (3)(a) For income tax years beginning on and after January 1, 2014, but before January 1, 2017, and for income tax years beginning on and after January 1, 2018, but before January 1, 2026, a resident individual is allowed a credit ... if adjusted gross income is twenty-five thousand dollars or less, the individual has insufficient tax liability to claim any credit under section 39-22-119, expenses are for care of a dependent less than thirteen, and the expenses would be allowed under section 21 if sufficient tax liability existed. (3)(b) The credit equals twenty-five percent of child care expenses, capped at five hundred dollars for one dependent or one thousand dollars for two or more dependents. (3)(c) Excess credit is refunded. (4) Expense basis is limited by earned income. (5) Provider and dependent identifying information rules apply. (6) Part-year resident credit is apportioned under section 39-22-110(1). (8) The section is repealed effective December 31, 2030.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-119.5/1#legislative_findings_and_purpose
      reason: Subsection (1) states legislative findings and purpose rather than an entity-scoped tax computation.
    - output: us-co:statutes/39/39-22-119.5/a#credit_term_definition
      reason: The definition of "credit" names the child care expenses tax credit created in this section and is documentary; the executable amount is encoded in source-specific credit amount outputs.
    - output: us-co:statutes/39/39-22-119.5/2/b#dependent_same_meaning_as_internal_revenue_code_section_152_a_1
      reason: The term "dependent" is defined by same-meaning incorporation of Internal Revenue Code section 152(a)(1), which is not provided as copied RuleSpec context.
    - output: us-co:statutes/39/39-22-119.5/6#low_income_child_care_expenses_credit_after_part_year_apportionment
      reason: Part-year resident apportionment requires the ratio determined under section 39-22-110(1), which is not provided as copied RuleSpec context.
      source_values:
        - us-co:statutes/39/39-22-119.5#low_income_child_care_expenses_credit_before_part_year_apportionment
    - output: us-co:statutes/39/39-22-119.5/8#section_repeal
      reason: Subsection (8) states a repeal date for the section rather than an entity-scoped amount or eligibility computation.
imports:
  - us-co:statutes/39/39-22-119#child_and_dependent_care_expenses_credit_before_part_year_apportionment
rules:
