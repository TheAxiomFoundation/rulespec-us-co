              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: before January 1, 2017, and ... on and after January 1, 2018
          - path: versions[2].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: on and after January 1, 2018, but before January 1, 2026
          - path: versions[3].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: but before January 1, 2026
    versions:
