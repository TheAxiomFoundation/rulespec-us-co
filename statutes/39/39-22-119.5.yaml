  - name: earned_income_limit_for_child_care_expense_basis
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119.5(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: single return ... earned income ... joint return, the lesser of either individual's earned income
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          if joint_return_filed: min(max(0, individual_earned_income), max(0, spouse_earned_income)) else: max(0, individual_earned_income)

  - name: child_care_expense_basis_after_earned_income_limit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119.5(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: child care expenses incurred during a taxable year that may be the basis of the credit shall not exceed
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          min(max(0, child_care_expenses_incurred_for_dependents_under_age_limit), earned_income_limit_for_child_care_expense_basis)

