    period: Year
    unit: USD
    source: 39-22-119.5(3)(b)(I)-(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: maximum amount ... Five hundred dollars for a single dependent; or One thousand dollars for two or more dependents
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          if qualifying_dependent_count_for_credit >= multiple_dependents_credit_cap_minimum_dependents: multiple_dependents_credit_cap else: if qualifying_dependent_count_for_credit == single_dependent_credit_cap_dependent_count: single_dependent_credit_cap else: 0

  - name: care_provider_information_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-119.5(5)(a)-(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: name, address, and taxpayer identification number ... included
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: organization described in section 501(c)(3) ... name and address
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: exercised due diligence in attempting to provide the required information
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          provider_name_address_and_tin_included_for_all_claimed_child_care_expenses
          or tax_exempt_organization_provider_name_and_address_included_for_all_claimed_child_care_expenses
          or due_diligence_exercised_to_provide_missing_provider_tin_for_all_claimed_child_care_expenses

  - name: low_income_child_care_expenses_credit_allowed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-119.5(3)(a), 39-22-119.5(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: a resident individual is allowed a credit
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: adjusted gross income of twenty-five thousand dollars or less
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-119#child_and_dependent_care_expenses_credit_before_part_year_apportionment
              output: child_and_dependent_care_expenses_credit_before_part_year_apportionment
              hash: sha256:471d5b98a2bdae21448adba9585631328cb9dcdcab6672d4ed1e49c8a06c535c
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: insufficient tax liability to claim any credit under section 39-22-119
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: would be allowed a credit for the expenses under section 21 ... if ... sufficient tax liability
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: includes the dependent's name and taxpayer identification number
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          low_income_child_care_credit_tax_year_indicator == 1
          and resident_individual
          and adjusted_gross_income <= low_income_adjusted_gross_income_limit
          and child_and_dependent_care_expenses_credit_before_part_year_apportionment == 0
          and low_income_child_care_expenses_credit_dependent_cap > 0
          and child_care_expense_basis_after_earned_income_limit > 0
          and expenses_would_be_allowed_for_credit_under_section_21_if_sufficient_tax_liability
          and care_provider_information_requirement_satisfied
          and dependent_name_and_taxpayer_identification_number_included_for_all_claimed_dependents

  - name: low_income_child_care_expenses_credit_before_part_year_apportionment
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119.5(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: credit is equal to twenty-five percent ... except that the maximum amount
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          if low_income_child_care_expenses_credit_allowed: min(max(0, low_income_child_care_expenses_credit_percentage * child_care_expense_basis_after_earned_income_limit), low_income_child_care_expenses_credit_dependent_cap) else: 0

  - name: low_income_child_care_expenses_credit_refundable_excess_before_part_year_apportionment
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-119.5(3)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-119.5
              excerpt: amount of the credit that exceeds ... income taxes due is refunded
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          max(0, low_income_child_care_expenses_credit_before_part_year_apportionment - resident_individual_income_taxes_due_under_article_22)
