  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: (1.5) Subject to subsection (2) of this section, with respect to taxable
    years commencing on or after January 1, 1999, but prior to January 1, 2000, a
    tax of four and three-quarters percent is imposed on the federal taxable income,
    as determined pursuant to section 63 of the internal revenue code, of every individual,
    estate, and trust.
