format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    For income tax years ending or beginning on and after enactment of the "CARES Act", but before January 1, 2021, an amount equal to the amount in excess of the section 163(j) business interest limitation without regard to CARES Act section 2306 amendments.
rules:
  - name: business_interest_excess_addition_to_federal_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: us-co/statute/39/39-22-104(3)(n)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: income tax years ending on and after the enactment of the "CARES Act", but before January 1, 2021, and for income tax years beginning on and after the enactment of the "CARES Act", but before January 1, 2021
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: an amount equal to the amount in excess of the limitation on business interest under section 163 (j) of the internal revenue code without regard to the amendments made by section 2306 of the "CARES Act"
    versions:
      - effective_from: '1999-01-01'
        formula: |-
          if income_tax_year_is_in_cares_act_business_interest_addition_window: max(0, business_interest_amount_in_excess_of_section_163_j_limitation_without_cares_act_section_2306_amendments) else: 0
