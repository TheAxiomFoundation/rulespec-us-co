format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    "interest income which is excluded from gross income for federal income tax purposes" less stated reductions and Colorado-obligation exceptions.
rules:
  - name: federal_tax_exempt_interest_addition_to_federal_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-104(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "interest income which is excluded from gross income for federal income tax purposes"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "less amortization of premium on obligations of any state"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "issued on or after May 1, 1980"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "issued prior to May 1, 1980"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "net amount after reduction by the amount of the deductions related thereto"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          max(
            0,
            federal_return_tax_exempt_interest_income_excluded_from_gross_income
            - amortization_of_premium_on_state_or_local_obligations
            - interest_income_on_colorado_obligations_issued_on_or_after_statutory_cutoff_excluded_from_federal_gross_income
            - interest_income_on_colorado_obligations_issued_before_statutory_cutoff_specifically_exempt_under_colorado_issuing_law_excluded_from_federal_gross_income
            - deductions_allocated_to_interest_included_in_this_addition_under_internal_revenue_code
          )
