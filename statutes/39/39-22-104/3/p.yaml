  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: "\xA7 39-22-104(3)(p): Except as otherwise provided in subsection (3)(p.5),\
    \ for income tax years commencing on or after January 1, 2022, taxpayers who claim\
    \ itemized deductions and have federal adjusted gross income equal to or exceeding\
    \ four hundred thousand dollars add the excess of itemized deductions over thirty\
    \ thousand dollars for a single return or sixty thousand dollars for a joint return."
  deferred_outputs:
  - output: us-co:statutes/39/39-22-104/3/p#itemized_deduction_addition_to_federal_taxable_income
