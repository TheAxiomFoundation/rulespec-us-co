format: rulespec/v1
imports:
  - us-co:statutes/39/39-22-104/3/p/5
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    Except as otherwise provided in subsection (3)(p.5), for income tax years commencing on or after January 1, 2022, taxpayers who claim itemized deductions and have federal adjusted gross income equal to or exceeding four hundred thousand dollars use the excess over thirty thousand dollars for a single return and sixty thousand dollars for a joint return.
rules:
  - name: federal_adjusted_gross_income_threshold_for_itemized_deduction_addition
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(3)(p)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: federal adjusted gross income in the income tax year equal to or exceeding four hundred thousand dollars
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          400000

  - name: single_return_itemized_deduction_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(3)(p)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: For a taxpayer who files a single return ... exceed thirty thousand dollars
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          30000

  - name: joint_return_itemized_deduction_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(3)(p)(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: For taxpayers who file a joint return ... exceed sixty thousand dollars
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          60000

  - name: taxpayer_subject_to_itemized_deduction_addition
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-104(3)(p)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: income tax years commencing on or after January 1, 2022
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: Except as otherwise provided in subsection (3)(p.5)
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: taxpayers who claim itemized deductions
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: federal adjusted gross income ... equal to or exceeding four hundred thousand dollars
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: taxpayer who files a single return; taxpayers who file a joint return
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/3/p#federal_adjusted_gross_income_threshold_for_itemized_deduction_addition
              output: federal_adjusted_gross_income_threshold_for_itemized_deduction_addition
              hash: sha256:local
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          subsection_p_5_does_not_displace_this_subsection
          and taxpayer_claims_itemized_deductions
          and federal_adjusted_gross_income >= federal_adjusted_gross_income_threshold_for_itemized_deduction_addition
          and (taxpayer_files_single_return or taxpayers_file_joint_return)

  - name: itemized_deduction_excess_addition_to_federal_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(3)(p)(I)-(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: amount by which the itemized deductions deducted from gross income ... exceed
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/3/p#taxpayer_subject_to_itemized_deduction_addition
              output: taxpayer_subject_to_itemized_deduction_addition
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/3/p#single_return_itemized_deduction_threshold
              output: single_return_itemized_deduction_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/3/p#joint_return_itemized_deduction_threshold
              output: joint_return_itemized_deduction_threshold
              hash: sha256:local
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          if taxpayer_subject_to_itemized_deduction_addition:
            if taxpayer_files_single_return:
              max(0, itemized_deductions_deducted_from_gross_income_on_federal_return - single_return_itemized_deduction_threshold)
            else:
              if taxpayers_file_joint_return:
                max(0, itemized_deductions_deducted_from_gross_income_on_federal_return - joint_return_itemized_deduction_threshold)
              else:
                0
          else:
            0
