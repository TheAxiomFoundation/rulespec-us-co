format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    (d)(I) For income tax years beginning on and after January 1, 1992, taxpayers who deduct state income taxes add an amount equal to the deduction claimed, limited to the amount required to reduce the federal itemized amount to the standard deduction. (d)(II) For income tax years beginning on or after January 1, 2000, two individuals on a joint federal return use a limit based on double the basic standard deduction for an individual who is not head of household plus any additional standard deduction.
rules:
  - name: state_income_tax_deduction_addition_limit
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(3)(d)(I)-(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "For income tax years beginning on and after January 1, 1992"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "limited to the amount required to reduce the federal itemized amount ... to the amount of the standard deduction"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "an amount equal to double the amount of the basic standard deduction ... plus any additional standard deduction"
    versions:
      - effective_from: '1992-01-01'
        formula: |-
          max(0, federal_itemized_amount_computed_on_federal_return - (if income_tax_year_in_joint_return_special_rule_effective_window and federal_taxable_income_determined_on_joint_federal_return_for_two_individuals: (2 * basic_standard_deduction_allowable_for_individual_non_head_of_household_federal_return) + additional_standard_deduction_allowable_on_federal_return else: standard_deduction_allowable_on_federal_return))
  - name: state_income_tax_deduction_addition_to_federal_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(3)(d)(I)-(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "For income tax years beginning on and after January 1, 1992"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "for those taxpayers who deduct state income taxes"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "an amount equal to the deduction claimed; except that such amount shall be limited"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/3/d#state_income_tax_deduction_addition_limit
              output: state_income_tax_deduction_addition_limit
              hash: sha256:local
    versions:
      - effective_from: '1992-01-01'
        formula: |-
          if taxpayer_deducts_state_income_taxes_on_federal_return: max(0, min(state_income_taxes_deduction_claimed_on_federal_return, state_income_tax_deduction_addition_limit)) else: 0
