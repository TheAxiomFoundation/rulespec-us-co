format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    (t) For income tax years commencing on or after January 1, 2025, an amount equal to the amount of employer contribution that an employee forfeits pursuant to section 39-22-558 (3)(c) and that the taxpayer had previously subtracted from the taxpayer's federal taxable income pursuant to subsection (4)(bb) of this section.
rules:
