format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    For income tax years commencing on or after January 1, 2024, but before January 1, 2031, an amount equal to a federal deduction claimed for a business meal pursuant to IRC section 274(k). Subsection (3)(s) is repealed effective December 31, 2035.
rules:
  - name: business_meal_deduction_addition_to_federal_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(3)(s)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "For income tax years commencing on or after January 1, 2024, but before January 1, 2031"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "an amount equal to a federal deduction claimed for a business meal pursuant to section 274 (k) of the internal revenue code"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if income_tax_year_commences_in_temporary_business_meal_addition_window: max(0, business_meal_deduction_claimed_on_federal_return) else: 0
