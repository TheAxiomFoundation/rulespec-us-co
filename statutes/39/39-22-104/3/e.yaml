            or club_policy_restricts_membership_on_basis_of_religion
            or club_policy_restricts_membership_on_basis_of_color
            or club_policy_restricts_membership_on_basis_of_ancestry
            or club_policy_restricts_membership_on_basis_of_national_origin
          )
