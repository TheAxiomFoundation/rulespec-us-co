format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    (e) (I) Any expenses incurred by a taxpayer with respect to expenditures made at, or payments made to, a club licensed pursuant to section 44-3-418 that has a policy to restrict membership on the basis of sex, sexual orientation, gender identity, gender expression, marital status, race, creed, religion, color, ancestry, or national origin. Any such club shall provide on each receipt furnished to a taxpayer a printed statement as follows:
    The expenditures covered by this receipt are
    nondeductible for state income tax purposes.
rules:
  - name: taxpayer_expenditure_or_payment_to_restricted_membership_club
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. 39-22-104(3)(e)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "expenditures made at, or payments made to, a club"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "club licensed pursuant to section 44-3-418"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "has a policy to restrict membership on the basis of sex, sexual orientation, gender identity, gender expression, marital status, race, creed, religion, color, ancestry, or national origin"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          taxpayer_made_expenditure_at_or_payment_to_club
          and club_licensed_under_section_44_3_418
          and (
            club_policy_restricts_membership_on_basis_of_sex
            or club_policy_restricts_membership_on_basis_of_sexual_orientation
            or club_policy_restricts_membership_on_basis_of_gender_identity
            or club_policy_restricts_membership_on_basis_of_gender_expression
