format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    For specified income tax years around enactment of the CARES Act and before January 1, 2021, add an amount equal to the difference between the taxpayer's section 172(a) net operating loss deduction before and after CARES Act section 2303 amendments.
rules:
  - name: income_tax_year_in_cares_act_net_operating_loss_addition_window
    kind: derived
    entity: TaxUnit
    dtype: Judgment
    period: Year
    source: Colo. Rev. Stat. § 39-22-104(3)(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "income tax years ending on and after the enactment of the March 2020 \"Coronavirus Aid, Relief, and Economic Security Act\""
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "income tax years beginning on and after the enactment of the \"CARES Act\", but before January 1, 2021"
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          income_tax_year_ends_on_or_after_cares_act_enactment_and_before_statutory_cutoff
          or income_tax_year_begins_on_or_after_cares_act_enactment_and_before_statutory_cutoff
  - name: cares_act_net_operating_loss_deduction_difference_addition_to_federal_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(3)(l)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "an amount equal to the difference between a taxpayer's net operating loss deduction"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "before the amendments made by section 2303 of the \"CARES Act\""
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "after the amendments made by section 2303 of the \"CARES Act\""
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/3/l#income_tax_year_in_cares_act_net_operating_loss_addition_window
              output: income_tax_year_in_cares_act_net_operating_loss_addition_window
              hash: sha256:local
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if income_tax_year_in_cares_act_net_operating_loss_addition_window: max(0, net_operating_loss_deduction_determined_under_section_172_a_after_cares_act_section_2303_amendments - net_operating_loss_deduction_determined_under_section_172_a_before_cares_act_section_2303_amendments) else: 0
