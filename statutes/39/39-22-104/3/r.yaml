    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    For income tax years commencing on or after January 1, 2018, subsection (3)(r) applies an amount equal to the deduction taken under IRC section 199A, except to the extent otherwise disallowed under IRC section 265, for an electing pass-through entity owner of an electing pass-through entity as defined in section 39-22-342.
