format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    For income tax years commencing on or after January 1, 2000, add the section 170 charitable contribution deduction to the extent it includes a real property contribution to a charitable organization for a conservation purpose for which a section 39-22-522 income tax credit is claimed.
rules:
  - name: real_property_conservation_charitable_contribution_deduction_addition_to_federal_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(3)(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "income tax years commencing on or after January 1, 2000"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "an amount equal to the charitable contribution deduction allowed by section 170"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "to the extent such deduction includes a contribution of real property to a charitable organization for a conservation purpose"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "for which an income tax credit is claimed pursuant to section 39-22-522"
    versions:
      - effective_from: '2000-01-01'
        formula: |-
          max(0, federal_charitable_contribution_deduction_amount_for_real_property_contribution_to_charitable_organization_for_conservation_purpose_with_credit_claimed_pursuant_to_section_39_22_522)
