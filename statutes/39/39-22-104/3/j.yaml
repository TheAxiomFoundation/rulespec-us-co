format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    For income tax years commencing on or after January 1, 2015, but before January 1, 2020, an amount equal to the charitable contribution deduction allowed by section 170 of the internal revenue code to the extent the deduction includes a food contribution to a hunger-relief charitable organization for which an income tax credit is claimed pursuant to section 39-22-536.
rules:
  - name: hunger_relief_food_contribution_charitable_deduction_addition_to_federal_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. 39-22-104(3)(j)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: income tax years commencing on or after January 1, 2015, but before January 1, 2020
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: amount equal to the charitable contribution deduction allowed by section 170 of the internal revenue code to the extent such deduction includes a food contribution
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: to a hunger-relief charitable organization for which an income tax credit is claimed pursuant to section 39-22-536
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          if taxable_year_is_in_temporary_effective_window and income_tax_credit_claimed_for_hunger_relief_food_contribution_under_section_39_22_536: max(0, federal_return_charitable_contribution_deduction_amount_attributable_to_hunger_relief_food_contribution) else: 0
