format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    (q)(I) For income tax years commencing on or after January 1, 2022, but before January 1, 2023, an amount equal to a federal deduction claimed for a food and beverage expense that exceeds fifty percent of the amount of the expense and that was allowed under section 274(n)(2)(D) of the internal revenue code. (II) Repealed effective December 31, 2030.
rules:
  - name: regular_food_and_beverage_expense_deduction_percentage
    kind: parameter
    dtype: Rate
    source: C.R.S. § 39-22-104(3)(q)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "exceeds fifty percent of the amount of the expense"
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          0.50
  - name: food_and_beverage_expense_deduction_addition_to_federal_taxable_income
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. § 39-22-104(3)(q)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "an amount equal to a federal deduction claimed for the income tax year for a food and beverage expense that exceeds fifty percent of the amount of the expense"
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "income tax years commencing on or after January 1, 2022, but before January 1, 2023"
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          if income_tax_year_commences_in_temporary_food_and_beverage_addition_window: max(0, federal_return_food_and_beverage_expense_deduction_claimed - (regular_food_and_beverage_expense_deduction_percentage * food_and_beverage_expense_amount_for_federal_return_deduction)) else: 0
