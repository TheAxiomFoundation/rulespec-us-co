      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: taxpayers who file a joint return and whose adjusted gross income
            is greater than one million dollars
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: does not apply to a taxpayer who is required to file a schedule
            F
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:statutes/39/39-22-104/3/o#single_return_adjusted_gross_income_threshold_for_section_199a_addition
          output: single_return_adjusted_gross_income_threshold_for_section_199a_addition
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:statutes/39/39-22-104/3/o#joint_return_adjusted_gross_income_threshold_for_section_199a_addition
          output: joint_return_adjusted_gross_income_threshold_for_section_199a_addition
          hash: sha256:local
  versions:
  - effective_from: '2021-01-01'
    formula: "(\n  (\n    taxpayer_files_single_return\n    and federal_adjusted_gross_income\
      \ > single_return_adjusted_gross_income_threshold_for_section_199a_addition\n\
      \  )\n  or\n  (\n    taxpayers_file_joint_return\n    and federal_adjusted_gross_income\
      \ > joint_return_adjusted_gross_income_threshold_for_section_199a_addition\n\
      \  )\n)\nand\nnot taxpayer_required_to_file_schedule_f_with_federal_return_for_year_claiming_section_199a_deduction"
