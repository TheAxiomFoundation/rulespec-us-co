format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: "\xA7 39-22-104(3)(o): For income tax years commencing on or after January\
    \ 1, 2021, add an amount equal to the deduction allowed under section 199A of\
    \ the internal revenue code for single-return taxpayers with adjusted gross income\
    \ greater than $500,000 and joint-return taxpayers with adjusted gross income\
    \ greater than $1,000,000; the subsection does not apply to a taxpayer required\
    \ to file schedule F, profit or loss from farming, or successor form, with the\
    \ federal return for the tax year in which the section 199A deduction is claimed."
rules:
- name: single_return_adjusted_gross_income_threshold_for_section_199a_addition
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(3)(o)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: single return and whose adjusted gross income is greater than five
            hundred thousand dollars
  versions:
  - effective_from: '2021-01-01'
    formula: '500000'
- name: joint_return_adjusted_gross_income_threshold_for_section_199a_addition
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(3)(o)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: joint return and whose adjusted gross income is greater than one
            million dollars
  versions:
  - effective_from: '2021-01-01'
    formula: '1000000'
- name: taxpayer_subject_to_section_199a_deduction_addition
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: 39-22-104(3)(o)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: For income tax years commencing on or after January 1, 2021
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: taxpayer who files a single return and whose adjusted gross income
