format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: "\xA7 39-22-104(3)(p.5): For income tax years commencing on or after January\
    \ 1, 2023, taxpayers who claim itemized deductions or the standard deduction and\
    \ have federal adjusted gross income equal to or exceeding $300,000 add to federal\
    \ taxable income the excess over $12,000 for a single return or $16,000 for a\
    \ joint return. Alternative editor-note versions may limit subsection (3)(p.5)(I)\
    \ to years before January 1, 2026, and subsection (3)(p.5)(I.5), if effective,\
    \ requires Department of Revenue-determined post-2025 thresholds. Subsection (3)(p.5)(II)\
    \ addresses appropriations and provides that the addition does not apply after\
    \ repeal of the healthy school meals for all program or successor program."
  deferred_outputs:
  - output: us-co:statutes/39/39-22-104/3/p/5#post_initial_window_addition_to_federal_taxable_income
    reason: Subsection (3)(p.5)(I.5), effective only if the ballot issues described
      in sections 22-82.9-212 and 22-82.9-213 are rejected, requires threshold amounts
      determined by the Department of Revenue; those amounts are not stated in the
      source text and no copied RuleSpec source provides them.
    source_values:
    - us-co:statutes/39/39-22-104/3/p/5#federal_adjusted_gross_income_threshold
  - output: us-co:statutes/39/39-22-104/3/p/5#healthy_school_meals_appropriation_amount
    reason: Subsection (3)(p.5)(II) is an appropriation directive to the general assembly
      and depends on revenue generated by the addition and program funding costs or
      cash-fund routing; the requested executable income-tax addition is encoded separately.
    source_values:
    - us-co:statutes/39/39-22-104/3/p/5#initial_window_addition_to_federal_taxable_income
rules:
- name: federal_adjusted_gross_income_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(3)(p.5)(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: federal adjusted gross income in the income tax year equal to or
            exceeding three hundred thousand dollars
  versions:
  - effective_from: '2023-01-01'
    formula: '300000'
- name: single_return_deduction_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(3)(p.5)(I)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: For a taxpayer who files a single return ... exceeds ... twelve
            thousand dollars
  versions:
  - effective_from: '2023-01-01'
    formula: '12000'
- name: joint_return_deduction_threshold
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(3)(p.5)(I)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: For taxpayers who file a joint return ... exceeds ... sixteen thousand
            dollars
  versions:
  - effective_from: '2023-01-01'
    formula: '16000'
- name: itemized_or_standard_deduction_addition_applies
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: 39-22-104(3)(p.5)(I), 39-22-104(3)(p.5)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: For income tax years commencing on or after January 1, 2023
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: taxpayers who claim itemized deductions ... or the standard deduction
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: federal adjusted gross income ... equal to or exceeding three hundred
            thousand dollars
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: does not apply for an income tax year that commences after the
            healthy school meals for all program, or any successor program, is repealed
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:statutes/39/39-22-104/3/p/5#federal_adjusted_gross_income_threshold
          output: federal_adjusted_gross_income_threshold
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: 'income_tax_year_in_initial_subsection_effective_window

      and taxpayer_claims_itemized_deductions_or_standard_deduction

      and federal_adjusted_gross_income >= federal_adjusted_gross_income_threshold

      and not healthy_school_meals_for_all_program_or_successor_program_repealed_before_income_tax_year'
- name: initial_window_addition_to_federal_taxable_income
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-104(3)(p.5)(I)(A)-(B), 39-22-104(3)(p.5)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: the amount by which the itemized deductions ... exceed, or the
            standard deduction ... exceeds
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: twelve thousand dollars; sixteen thousand dollars
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: does not apply for an income tax year that commences after the
            healthy school meals for all program, or any successor program, is repealed
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:statutes/39/39-22-104/3/p/5#itemized_or_standard_deduction_addition_applies
          output: itemized_or_standard_deduction_addition_applies
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:statutes/39/39-22-104/3/p/5#single_return_deduction_threshold
          output: single_return_deduction_threshold
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: us-co:statutes/39/39-22-104/3/p/5#joint_return_deduction_threshold
          output: joint_return_deduction_threshold
          hash: sha256:local
  versions:
  - effective_from: '2023-01-01'
    formula: "if itemized_or_standard_deduction_addition_applies:\n  if taxpayer_files_single_return:\n\
      \    max(0, max(itemized_deductions_deducted_from_gross_income, standard_deduction_deducted_from_gross_income)\
      \ - single_return_deduction_threshold)\n  else:\n    if taxpayers_file_joint_return:\n\
      \      max(0, max(itemized_deductions_deducted_from_gross_income, standard_deduction_deducted_from_gross_income)\
      \ - joint_return_deduction_threshold)\n    else:\n      0\nelse:\n  0"
