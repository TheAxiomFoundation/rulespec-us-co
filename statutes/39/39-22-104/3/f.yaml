    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. 39-22-104(3)(f)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "Any amount withdrawn from a medical savings account"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "pursuant to section 39-22-504.7 (3)(b)(II)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "or (3)(b)(III)"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          max(0, max(0, medical_savings_account_withdrawal_amount_pursuant_to_section_39_22_504_7_3_b_ii)
