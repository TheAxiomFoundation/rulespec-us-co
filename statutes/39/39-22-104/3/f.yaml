format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    Any amount withdrawn from a medical savings account pursuant to section 39-22-504.7 (3)(b)(II) or (3)(b)(III).
rules:
