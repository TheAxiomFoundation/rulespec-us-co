format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    Prior to applying the tax rate, federal taxable income is modified as provided in subsections (3) and (4).
imports:
  - us-co:statutes/39/39-22-104/3
  - us-co:statutes/39/39-22-104/4
rules:
  - name: federal_taxable_income_after_subsection_2_modifications
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-104(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "federal taxable income shall be modified as provided in subsections (3) and (4)"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "Prior to the application of the rate of tax"
    versions:
      - effective_from: '1987-01-01'
        formula: |-
          max(0, federal_taxable_income + additions_to_federal_taxable_income_provided_in_subsection_3 - subtractions_from_federal_taxable_income_provided_in_subsection_4)
