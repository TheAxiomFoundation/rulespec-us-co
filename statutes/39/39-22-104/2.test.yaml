- name: federal taxable income is increased by subsection 3 additions and reduced
    by subsection 4 subtractions
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-104/2#input.federal_taxable_income: 100000
    us-co:statutes/39/39-22-104/2#input.additions_to_federal_taxable_income_provided_in_subsection_3: 5000
    us-co:statutes/39/39-22-104/2#input.subtractions_from_federal_taxable_income_provided_in_subsection_4: 2000
  output:
    us-co:statutes/39/39-22-104/2#federal_taxable_income_after_subsection_2_modifications: 103000
- name: modified federal taxable income is floored at zero
  period:
    period_kind: tax_year
    start: '2024-01-01'
    end: '2024-12-31'
  input:
    us-co:statutes/39/39-22-104/2#input.federal_taxable_income: 1000
    us-co:statutes/39/39-22-104/2#input.additions_to_federal_taxable_income_provided_in_subsection_3: 0
    us-co:statutes/39/39-22-104/2#input.subtractions_from_federal_taxable_income_provided_in_subsection_4: 1500
  output:
    us-co:statutes/39/39-22-104/2#federal_taxable_income_after_subsection_2_modifications: 0
