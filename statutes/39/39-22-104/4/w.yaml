format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    39-22-104(4)(w): For income tax years commencing on or after January 1, 2017, and prior to January 1, 2025, an amount equal to interest and other income earned in a first-time home buyer savings account, to the extent included in federal taxable income and as permitted under part 47. Any exclusion is subject to recapture, and subsection (4)(w) is repealed effective December 31, 2028.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-104/4/w#first_time_home_buyer_savings_account_exclusion_recapture
      reason: Recapture is governed by paragraph (k) of subsection (3) and section 39-22-4705, which are not available in copied context; this source only states that exclusions taken under subparagraph (I) are subject to that external recapture.
