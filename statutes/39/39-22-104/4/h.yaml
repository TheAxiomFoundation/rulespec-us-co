format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: (h)(I) Prior to January 1, 2025, any amount contributed to a medical savings
    account by an employer pursuant to section 39-22-504.7 (2)(e), to the extent such
    amount is not claimed as a deduction on the taxpayer's federal tax return. (II)
    This subsection (4)(h) is repealed, effective December 31, 2028.
rules:
