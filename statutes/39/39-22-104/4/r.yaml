format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    For income tax years commencing on or after January 1, 2014, a taxpayer licensed under the Colorado Marijuana Code or predecessor codes may subtract an amount equal to qualifying federal deduction expenditures disallowed by IRC section 280E because marijuana is a controlled substance under federal law.
rules:
  - name: marijuana_business_280e_expenditure_subtraction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-104(r)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "For income tax years commencing on or after January 1, 2014"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "if a taxpayer is licensed under the Colorado Marijuana Code, article 10 of title 44, or its predecessor codes"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "an amount equal to any expenditure that is eligible to be claimed as a federal income tax deduction but is disallowed by section 280E"
    versions:
      - effective_from: '2014-01-01'
        formula: |-
          if taxpayer_is_licensed_under_colorado_marijuana_code_or_predecessor_codes: max(0, expenditures_eligible_for_federal_income_tax_deduction_but_disallowed_under_section_280e_because_marijuana_is_controlled_substance) else: 0
