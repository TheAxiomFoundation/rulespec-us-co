  summary: "\xA7 39-22-104(4)(i)(II)(B): Except as provided in subsection (4)(i)(II)(C),\
    \ for income tax years commencing on or after January 1, 2022, subtract payments\
    \ or contributions, not to exceed twenty thousand dollars per taxpayer per beneficiary\
    \ for a single return, or thirty thousand dollars per taxpayer per beneficiary\
    \ for taxpayers who file a joint return, made during the taxable year in connection\
    \ with specified qualified state tuition programs or, before January 1, 2031,\
    \ in connection with a qualified ABLE program. The broader subsection also contains\
    \ pension and annuity, medical savings account, wildfire mitigation, and marijuana-business\
    \ expenditure subtractions."
  deferred_outputs:
  - output: us-co:statutes/39/39-22-104/4/i/II/B#collegeinvest_or_able_contribution_subtraction
    reason: Faithful computation requires preserving the source-stated "per taxpayer
      per beneficiary" cap dimensions, the single-return and joint-return categories,
      the inflation-adjusted limits provided in subsection (4)(i)(II)(C), and the
      qualified state tuition program / qualified ABLE program definitions and exclusions
      under section 529, section 529A, and subsection (4)(i)(III). The available context
      does not provide executable filing-status or taxpayer-beneficiary contribution
      relations, adjusted-limit outputs, or the cited federal program definitions
      needed to compute the subtraction without approximation.
