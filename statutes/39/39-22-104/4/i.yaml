          excerpt: Before January 1, 2031
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: any distribution, refund, or any other withdrawal is made ... in
            connection with a qualified ABLE program
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: for any reason other than ... To pay qualified disability expenses
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: As a result of the beneficiary's death or disability
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: As a result of a change in designated beneficiary
  versions:
  - effective_from: '2024-01-01'
    formula: 'qualified_able_program_temporary_window_applies

      and qualified_able_program_distribution_refund_or_withdrawal_made

      and not qualified_able_program_distribution_refund_or_withdrawal_to_pay_qualified_disability_expenses

      and not qualified_able_program_distribution_refund_or_withdrawal_as_result_of_beneficiary_death_or_disability

      and not qualified_able_program_distribution_refund_or_withdrawal_as_result_of_compliant_designated_beneficiary_change'
