format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: "\xA7 39-22-104(4)(i): subtract the portion attributable to interest and\
    \ other income of qualified state tuition program distributions used for qualified\
    \ higher education expenses, to the extent included in federal taxable income;\
    \ before January 1, 2031, apply the same treatment to qualified ABLE program distributions\
    \ for qualified disability expenses. Contribution subtractions are limited per\
    \ taxpayer per beneficiary for tax years beginning on or after January 1, 2022.\
    \ Prior subtractions are added back for nonqualifying distributions, refunds,\
    \ or withdrawals, with stated exceptions."
  deferred_outputs:
  - output: us-co:statutes/39/39-22-104/4/i/II/A#qualified_state_tuition_program_contribution_subtraction
    reason: Faithful computation of the pre-2022 contribution subtraction requires
      the qualified state tuition program categories and contribution/payment mechanics
      cross-referenced to section 529 and CollegeInvest program law, which are not
      available as executable RuleSpec dependencies in the copied context.
  - output: us-co:statutes/39/39-22-104/4/i/II/B#collegeinvest_or_able_contribution_subtraction
    reason: Faithful computation requires preserving the per-taxpayer per-beneficiary
      cap dimensions, single-return and joint-return categories, annual adjusted limits
      under subsection (4)(i)(II)(C), and the qualified state tuition program and
      qualified ABLE program definitions cross-referenced to sections 529 and 529A.
      The copied context does not provide executable filing-status, taxpayer-beneficiary
      contribution relations, adjusted-limit outputs, or program-definition outputs.
  - output: us-co:statutes/39/39-22-104/4/i/II/C#annual_adjusted_contribution_subtraction_limits
    reason: The annual adjusted limits depend on the Department of Higher Education's
      annual calculation of the percentage change in combined average annual tuition
      and room-and-board costs and the Department of Revenue's rounding choice; those
      official annual values are not present in the copied context.
rules:
- name: qualified_state_tuition_program_distribution_income_subtraction
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-104(4)(i)(I)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: For income tax years commencing on or after January 1, 1998
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: an amount equal to the portion attributable to interest and other
            income of a distribution under a qualified state tuition program
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: distributed for the purpose of meeting qualified higher education
            expenses
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: to the extent such amount is included in federal taxable income
  versions:
  - effective_from: '1998-01-01'
    formula: max(0, qualified_state_tuition_program_distribution_interest_and_other_income_for_qualified_higher_education_expenses_included_in_federal_taxable_income)
- name: qualified_able_program_distribution_income_subtraction
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-104(4)(i)(I)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: Before January 1, 2031
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: an amount equal to the portion attributable to interest and other
            income of a distribution under a qualified ABLE program
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: distributed for the purpose of meeting qualified disability expenses
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: to the extent such amount is included in federal taxable income
  versions:
  - effective_from: '2024-01-01'
    formula: 'if qualified_able_program_temporary_window_applies: max(0, qualified_able_program_distribution_interest_and_other_income_for_qualified_disability_expenses_included_in_federal_taxable_income)
      else: 0'
- name: qualified_state_tuition_program_nonqualifying_distribution_refund_or_withdrawal_requires_addition
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: 39-22-104(4)(i)(III)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: predicate
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: any distribution, refund, or any other withdrawal is made pursuant
            to an advance payment contract, from a savings trust account, or otherwise
            in connection with a qualified state tuition program
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: for any reason other than ... To pay qualified higher education
            expenses
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: As a result of the beneficiary's death or disability
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: As a result of receiving a scholarship
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: As a result of a change in designated beneficiary
  versions:
  - effective_from: '2001-01-01'
    formula: 'qualified_state_tuition_program_distribution_refund_or_withdrawal_made

      and not qualified_state_tuition_program_distribution_refund_or_withdrawal_to_pay_qualified_higher_education_expenses

      and not qualified_state_tuition_program_distribution_refund_or_withdrawal_as_result_of_beneficiary_death_or_disability

      and not qualified_state_tuition_program_distribution_refund_or_withdrawal_as_result_of_scholarship_within_scholarship_amount_for_tax_year

      and not qualified_state_tuition_program_distribution_refund_or_withdrawal_as_result_of_compliant_designated_beneficiary_change'
- name: qualified_state_tuition_program_nonqualifying_withdrawal_addition
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-104(4)(i)(III)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: Any subtraction taken under this subsection (4)(i) is added to
            the account holder's taxable income
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: in the taxable year or years in which any distribution, refund,
            or any other withdrawal is made
  versions:
  - effective_from: '2001-01-01'
    formula: 'if qualified_state_tuition_program_nonqualifying_distribution_refund_or_withdrawal_requires_addition:
      max(0, qualified_state_tuition_program_prior_subtraction_taken_for_distribution_refund_or_withdrawal)
      else: 0'
