format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: '"for income tax years commencing on or after January 1, 2018," Colorado
    subtracts income earned as a direct result of winning a medal while competing
    for the United States at the Olympic games. The subtraction "does not apply" when
    federal adjusted gross income exceeds one million dollars, or five hundred thousand
    dollars for married filing separately.'
  deferred_outputs:
  - output: us-co:statutes/39/39-22-104/4/x#olympic_medal_income_subtraction
    reason: The final subtraction requires selecting between the general and married-filing-separately
      federal adjusted gross income limits. No imported filing-status output is available,
      and local filing-status inputs are disallowed.
rules:
- name: olympic_medal_income_subtraction_general_adjusted_gross_income_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-22-104(4)(x)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: income tax years commencing on or after January 1, 2018
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: exceeds one million dollars
  versions:
  - effective_from: '2018-01-01'
    formula: '1000000'
- name: olympic_medal_income_subtraction_married_filing_separately_adjusted_gross_income_limit
  kind: parameter
  dtype: Money
  unit: USD
  source: C.R.S. 39-22-104(4)(x)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: income tax years commencing on or after January 1, 2018
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: married filing separately, exceeds five hundred thousand dollars
  versions:
  - effective_from: '2018-01-01'
    formula: '500000'
- name: olympic_medal_income_subtraction_base_before_adjusted_gross_income_limit
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: C.R.S. 39-22-104(4)(x)(I), (III)(A), and (IV)
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: income tax years commencing on or after January 1, 2018
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: includes both the monetary value of the medal itself and any monetary
            award
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: does not include endorsement income or nonmonetary benefits
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: shall be subtracted from federal taxable income regardless of whether
            or not said monetary value is included
  versions:
  - effective_from: '2018-01-01'
    formula: 'max(0, monetary_value_of_medal_won_while_competing_for_united_states_at_olympic_or_paralympic_games)

      + max(0, monetary_award_for_winning_medal_by_united_states_olympic_committee_or_national_governing_body_or_paralympic_sport_organization_included_in_federal_taxable_income)'
- name: federal_adjusted_gross_income_exceeds_general_olympic_medal_subtraction_limit
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: C.R.S. 39-22-104(4)(x)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: income tax years commencing on or after January 1, 2018
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: federal adjusted gross income ... as determined prior to application
            of this subsection (4)(x), exceeds one million dollars
  versions:
  - effective_from: '2018-01-01'
    formula: 'federal_adjusted_gross_income_before_olympic_medal_subtraction

      > olympic_medal_income_subtraction_general_adjusted_gross_income_limit'
- name: federal_adjusted_gross_income_exceeds_married_filing_separately_olympic_medal_subtraction_limit
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: C.R.S. 39-22-104(4)(x)(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].effective_from
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: income tax years commencing on or after January 1, 2018
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: if the taxpayer's filing status is married filing separately, exceeds
            five hundred thousand dollars
  versions:
  - effective_from: '2018-01-01'
    formula: 'federal_adjusted_gross_income_before_olympic_medal_subtraction

      > olympic_medal_income_subtraction_married_filing_separately_adjusted_gross_income_limit'
