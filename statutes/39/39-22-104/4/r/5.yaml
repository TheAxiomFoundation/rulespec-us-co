  summary: |-
    For income tax years commencing on or after January 1, 2024, if a taxpayer is licensed pursuant to the Colorado Natural Medicine Code, an amount equal to eligible federal deduction expenditures disallowed by IRC section 280E because natural medicine is a controlled substance under federal law.
