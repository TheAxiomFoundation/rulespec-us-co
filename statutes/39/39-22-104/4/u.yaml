format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    § 39-22-104(4)(u): For income tax years commencing on or after January 1, 2016, an amount equal to compensation received for active duty service in the armed forces of the United States by an individual who has reacquired residency in the state pursuant to section 39-22-110.5, to the extent included in federal taxable income.
rules:
