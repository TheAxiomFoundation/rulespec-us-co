format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    § 39-22-104(4)(q): For income tax years commencing on or after January 1, 2013, subtract compensation received for an exonerated person pursuant to section 13-65-103 on or after January 1, 2014, except judgment portions awarded as attorney fees for bringing the claim.
rules:
  - name: exonerated_person_compensation_subtraction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-104(4)(q)
    metadata:
      proof:
        atoms:
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: income tax years commencing on or after January 1, 2013
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: an amount equal to any amount received as compensation for an exonerated person
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: on or after January 1, 2014
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: except as to those portions of the judgment awarded as attorney fees
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          max(0, exonerated_person_compensation_received_in_source_receipt_window - attorney_fee_portions_of_judgment_awarded_for_bringing_exonerated_person_compensation_claim)
