format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: "\xA7 39-22-104(4)(y): For income tax years commencing on or after January\
    \ 1, 2019, but prior to January 1, 2029, subtract an amount equal to a qualified\
    \ individual's military retirement benefits included in federal adjusted gross\
    \ income, not to exceed $4,500, $7,500, $10,000, or $15,000 for the stated tax-year\
    \ windows. \"Military retirement benefits\" means retirement benefits received\
    \ as a result of service in the armed forces of the United States. \"Qualified\
    \ individual\" means an individual under fifty-five years of age at the close\
    \ of the taxable year."
rules:
- name: military_retirement_benefits_cap_initial_phase
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(4)(y)(I)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: Four thousand five hundred dollars for income tax years commencing
            on or after January 1, 2019, but prior to January 1, 2020
  versions:
