format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: "\xA7 39-22-104(4)(f): For income tax years commencing on or after January\
    \ 1, 1989, subtract amounts received as pensions or annuities from any source\
    \ by an individual who is fifty-five years of age or older at the close of the\
    \ taxable year, and death-benefit pensions or annuities received by an individual\
    \ under fifty-five, to the extent included in federal adjusted gross income. Amounts\
    \ are capped at $20,000 for individuals age fifty-five to sixty-four and $24,000\
    \ for individuals age sixty-five or older, with social-security-benefit cap increases\
    \ for specified tax years."
rules:
- name: pension_annuity_subtraction_cap_for_age_fifty_five_to_sixty_four
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(4)(f)(III)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: capped at twenty thousand dollars per tax year for any individual
            who is fifty-five years of age or older but less than sixty-five years
            of age
  versions:
  - effective_from: '1989-01-01'
    formula: '20000'
- name: pension_annuity_subtraction_cap_for_age_sixty_five_or_older
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(4)(f)(III)(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: capped at twenty-four thousand dollars per tax year for any individual
            who is sixty-five years of age or older
  versions:
  - effective_from: '1989-01-01'
    formula: '24000'
- name: individual_filing_agi_limit_for_age_fifty_five_to_sixty_four_social_security_cap_increase
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(4)(f)(III)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: adjusted gross income ... is less than or equal to seventy-five
            thousand dollars if filing individually
  versions:
  - effective_from: '2025-01-01'
    formula: '75000'
- name: joint_filing_agi_limit_for_age_fifty_five_to_sixty_four_social_security_cap_increase
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(4)(f)(III)(A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: adjusted gross income ... is less than or equal to ... ninety-five
            thousand dollars if filing jointly
  versions:
  - effective_from: '2025-01-01'
    formula: '95000'
- name: individual_qualifies_for_pension_annuity_subtraction
  kind: derived
  entity: Person
  dtype: Judgment
  period: Year
  source: 39-22-104(4)(f)(I)-(II)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: any individual who is fifty-five years of age or older at the close
            of the taxable year
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: less than fifty-five years of age ... if such benefits are received
            because of the death of the person originally entitled
  versions:
  - effective_from: '1989-01-01'
    formula: 'individual_is_fifty_five_or_older_at_close_of_taxable_year

      or pension_or_annuity_benefits_are_received_because_of_death_of_originally_entitled_person'
- name: pension_annuity_subtraction_applicable_cap
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-104(4)(f)(III)(A)-(B)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: twenty thousand dollars per tax year ... twenty-four thousand dollars
            per tax year
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: If the total amount of such social security benefits exceeds the
            cap ... the cap is increased to an amount equal to the total amount of
            such social security benefits
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: For income tax years commencing on or after January 1, 2025
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: For income tax years commencing on or after January 1, 2022
  versions:
  - effective_from: '1989-01-01'
    formula: "if individual_is_sixty_five_or_older_at_close_of_taxable_year:\n  if\
      \ taxable_year_is_in_social_security_cap_increase_window_for_age_sixty_five_or_older\
      \ and social_security_benefits_included_in_federal_taxable_income > pension_annuity_subtraction_cap_for_age_sixty_five_or_older:\n\
      \    social_security_benefits_included_in_federal_taxable_income\n  else:\n\
      \    pension_annuity_subtraction_cap_for_age_sixty_five_or_older\nelse:\n  if\
      \ individual_is_fifty_five_or_older_at_close_of_taxable_year:\n    if taxable_year_is_in_social_security_cap_increase_window_for_age_fifty_five_to_sixty_four\
      \ and adjusted_gross_income_is_within_applicable_limit_for_age_fifty_five_to_sixty_four_social_security_cap_increase\
      \ and social_security_benefits_included_in_federal_taxable_income > pension_annuity_subtraction_cap_for_age_fifty_five_to_sixty_four:\n\
      \      social_security_benefits_included_in_federal_taxable_income\n    else:\n\
      \      pension_annuity_subtraction_cap_for_age_fifty_five_to_sixty_four\n  else:\n\
      \    pensions_and_annuity_amounts_included_in_federal_adjusted_gross_income"
- name: pension_annuity_subtraction
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-104(4)(f)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: amounts received as pensions or annuities from any source ... to
            the extent included in federal adjusted gross income
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: any individual who is fifty-five years of age or older at the close
            of the taxable year
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: benefits are received because of the death of the person originally
            entitled
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: Amounts subtracted under this subsection (4)(f) are capped
  versions:
  - effective_from: '1989-01-01'
    formula: 'if individual_qualifies_for_pension_annuity_subtraction: min(pensions_and_annuity_amounts_included_in_federal_adjusted_gross_income,
      pension_annuity_subtraction_applicable_cap) else: 0'
