format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: '(n.5) (I) (A) For income tax years commencing on or after January 1, 2014,
    but prior to January 1, 2017, and ... on or after January 1, 2020, but prior to
    January 1, 2025, an amount equal to fifty percent of a landowner''s costs incurred
    in performing wildfire mitigation measures ...; except that the amount of the
    deduction claimed ... shall not exceed two thousand five hundred dollars or the
    total amount of the landowner''s federal taxable income ... whichever is less.

    (A.5) For income tax years commencing on or after January 1, 2017, but prior to
    January 1, 2020, an amount equal to one hundred percent ...

    (B) In the case of two taxpayers filing a joint return, the amount subtracted
    from federal taxable income shall not exceed two thousand five hundred dollars
    ...

    (II) A landowner ... may claim the deduction ... if the wildfire mitigation measures
    are performed in a wildland-urban interface area.'
rules:
- name: wildfire_mitigation_deduction_rate
  kind: parameter
  dtype: Rate
  source: "Colo. Rev. Stat. \xA7 39-22-104(4)(n.5)(I)(A), (A.5)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: on or after January 1, 2014, but prior to January 1, 2017 ... fifty
            percent
      - path: versions[1].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: on or after January 1, 2017, but prior to January 1, 2020 ... one
            hundred percent
      - path: versions[2].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: on or after January 1, 2020, but prior to January 1, 2025 ... fifty
            percent
      - path: versions[3].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: prior to January 1, 2025
  versions:
  - effective_from: '2014-01-01'
    formula: '0.50'
  - effective_from: '2017-01-01'
    formula: '1.00'
  - effective_from: '2020-01-01'
    formula: '0.50'
  - effective_from: '2025-01-01'
    formula: '0'
- name: claimed_wildfire_mitigation_deduction_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: "Colo. Rev. Stat. \xA7 39-22-104(4)(n.5)(I)(A), (A.5)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: shall not exceed two thousand five hundred dollars
  versions:
  - effective_from: '2014-01-01'
    formula: '2500'
- name: joint_return_wildfire_mitigation_deduction_cap
  kind: parameter
  dtype: Money
  unit: USD
  source: "Colo. Rev. Stat. \xA7 39-22-104(4)(n.5)(I)(B)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: two taxpayers filing a joint return ... shall not exceed two thousand
            five hundred dollars
  versions:
  - effective_from: '2014-01-01'
    formula: '2500'
- name: applicable_wildfire_mitigation_deduction_cap
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: "Colo. Rev. Stat. \xA7 39-22-104(4)(n.5)(I)(A), (A.5), (B)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: In the case of two taxpayers filing a joint return, the amount
            subtracted ... shall not exceed two thousand five hundred dollars
  versions:
  - effective_from: '2014-01-01'
    formula: 'if taxpayers_file_joint_return: joint_return_wildfire_mitigation_deduction_cap
      else: claimed_wildfire_mitigation_deduction_cap'
- name: wildfire_mitigation_deduction_allowed
  kind: derived
  entity: TaxUnit
  dtype: Judgment
  period: Year
  source: "Colo. Rev. Stat. \xA7 39-22-104(4)(n.5)(I)(B)-(C), (II), (III)(B)-(D)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
  versions:
  - effective_from: '2014-01-01'
    formula: "claimant_is_landowner\nand costs_are_actual_out_of_pocket_incurred_paid_documented_and_not_excluded\n\
      and landowner_performed_measures_on_own_real_property_located_within_state\n\
      and measures_performed_in_wildland_urban_interface_area\nand (\n  activity_created_defensible_space_around_structures\n\
      \  or activity_established_fuel_breaks\n  or activity_thinned_woody_vegetation_for_primary_purpose_of_reducing_risk_to_structures_from_wildland_fire\n\
      \  or activity_secondarily_treated_woody_fuels_by_lopping_scattering_piling_chipping_removing_from_site_or_prescribed_burning\n\
      )\nand (\n  activities_meet_or_exceed_colorado_state_forest_service_standards\n\
      \  or activities_meet_or_exceed_other_applicable_state_rules\n)\nand separate_return_one_taxpayer_claim_limit_satisfied\n\
      and tenants_in_common_one_individual_claim_limit_satisfied"
- name: wildfire_mitigation_deduction
  kind: derived
  entity: TaxUnit
  dtype: Money
  period: Year
  unit: USD
  source: "Colo. Rev. Stat. \xA7 39-22-104(4)(n.5)(I)(A), (A.5)"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: an amount equal to fifty percent ... except that ... shall not
            exceed two thousand five hundred dollars or ... federal taxable income
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
  versions:
  - effective_from: '2014-01-01'
    formula: 'if wildfire_mitigation_deduction_allowed: min(wildfire_mitigation_deduction_rate
      * max(0, landowner_wildfire_mitigation_costs), min(applicable_wildfire_mitigation_deduction_cap,
      max(0, federal_taxable_income))) else: 0'
