format: rulespec/v1
imports:
  - us-co:statutes/39/39-22-104/3/l#cares_act_net_operating_loss_deduction_difference_addition_to_federal_taxable_income
  - us-co:statutes/39/39-22-104/3/m#temporary_excess_business_loss_addition_applies
  - us-co:statutes/39/39-22-104/3/n#business_interest_excess_addition_to_federal_taxable_income
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    § 39-22-104(4)(z): "for income tax years beginning on or after January 1, 2021, but before January 1, 2022" the subtraction is the taxable-income excess for specified years plus amounts added back under subsections (3)(l), (3)(m), and (3)(n). It "is limited to the lesser of the taxpayer's Colorado taxable income or three hundred thousand dollars"; unclaimed amounts may be carried forward, with each year's subtraction capped at the lesser of Colorado taxable income or "one hundred fifty thousand dollars" for the temporary carryforward period and Colorado taxable income thereafter.
  deferred_outputs:
    - output: us-co:statutes/39/39-22-104/4/z#qualified_improvement_property_federal_basis_for_higher_colorado_basis_subtraction
      reason: Subsection (4)(z)(III) changes the basis used to calculate gain or loss for the subsection (4)(b) subtraction when the taxpayer applies this subsection to qualified improvement property. The copied subsection (4)(b) executable output does not expose a purpose-specific basis override, so composing that adjusted calculation in this file would approximate the cited subsection.
rules:
  - name: initial_retroactive_cares_act_subtraction_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(4)(z)(II)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "limited to the lesser of the taxpayer's Colorado taxable income or three hundred thousand dollars"
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          300000
  - name: temporary_retroactive_cares_act_carryforward_subtraction_cap
    kind: parameter
    dtype: Money
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(4)(z)(II)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "one hundred fifty thousand dollars for the income tax years commencing on or after January 1, 2022, but before January 1, 2026"
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          150000
  - name: retroactive_cares_act_subtraction_calculated_before_limitation
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(4)(z)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "for income tax years beginning on or after January 1, 2021, but before January 1, 2022"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "the sum of the amount by which taxable income for the specified tax years exceeds the taxable income for the modified specified tax years computed separately for each income tax year"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "plus the sum of any amounts added back by the taxpayer as specified in subsections (3)(l), (3)(m), and (3)(n)"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/3/l#cares_act_net_operating_loss_deduction_difference_addition_to_federal_taxable_income
              output: cares_act_net_operating_loss_deduction_difference_addition_to_federal_taxable_income
              hash: sha256:e0dab6183505083a7e38e2a7a57b2416dbb7cb0b904fa6f8c6c4d6c011f107c6
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/3/m#temporary_excess_business_loss_addition_applies
              output: temporary_excess_business_loss_addition_applies
              hash: sha256:3da1c02c098afe37eb643e5a668491c41cc95760f0f3a195bc0f327d66c66f89
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/3/n#business_interest_excess_addition_to_federal_taxable_income
              output: business_interest_excess_addition_to_federal_taxable_income
              hash: sha256:6783957d7176d414e098ab5ef72a7a62803cb9028b3029e0a96a16b60d1acc7d
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          if income_tax_year_commences_in_initial_subtraction_window: max(0, specified_tax_year_taxable_income_excess_sum_computed_separately) + cares_act_net_operating_loss_deduction_difference_addition_to_federal_taxable_income + (if temporary_excess_business_loss_addition_applies: max(0, excess_business_loss_amount_added_back_by_taxpayer_as_specified_in_subsection_3_m) else: 0) + business_interest_excess_addition_to_federal_taxable_income else: 0
  - name: retroactive_cares_act_subtraction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(4)(z)(II)(A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "applies after the application of the other subtractions provided for in this subsection (4)"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "limited to the lesser of the taxpayer's Colorado taxable income or three hundred thousand dollars"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "Colorado taxable income means federal taxable income as modified by this article 22 without regard to this subsection (4)(z)"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/4/z#retroactive_cares_act_subtraction_calculated_before_limitation
              output: retroactive_cares_act_subtraction_calculated_before_limitation
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/4/z#initial_retroactive_cares_act_subtraction_cap
              output: initial_retroactive_cares_act_subtraction_cap
              hash: sha256:local
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          if income_tax_year_commences_in_initial_subtraction_window: min(retroactive_cares_act_subtraction_calculated_before_limitation, min(max(0, colorado_taxable_income_without_subsection_z), initial_retroactive_cares_act_subtraction_cap)) else: 0
  - name: retroactive_cares_act_subtraction_carryforward_generated
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(4)(z)(II)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "Any amount of the subtraction calculated under subsection (4)(z)(I) ... that a taxpayer may not claim by operation of subsection (4)(z)(II)(A) ... may be carried forward"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/4/z#retroactive_cares_act_subtraction_calculated_before_limitation
              output: retroactive_cares_act_subtraction_calculated_before_limitation
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/4/z#retroactive_cares_act_subtraction
              output: retroactive_cares_act_subtraction
              hash: sha256:local
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          if income_tax_year_commences_in_initial_subtraction_window: max(0, retroactive_cares_act_subtraction_calculated_before_limitation - retroactive_cares_act_subtraction) else: 0
  - name: retroactive_cares_act_carryforward_subtraction_cap
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(4)(z)(II)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "each tax year's subtraction may not exceed the lesser of the taxpayer's Colorado taxable income or one hundred fifty thousand dollars"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "each year's subtraction may not exceed the taxpayer's Colorado taxable income in any income tax years thereafter"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/4/z#temporary_retroactive_cares_act_carryforward_subtraction_cap
              output: temporary_retroactive_cares_act_carryforward_subtraction_cap
              hash: sha256:local
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          if income_tax_year_commences_in_temporary_carryforward_cap_window:
            min(max(0, colorado_taxable_income_without_subsection_z), temporary_retroactive_cares_act_carryforward_subtraction_cap)
          else:
            if income_tax_year_commences_after_temporary_carryforward_cap_window:
              max(0, colorado_taxable_income_without_subsection_z)
            else:
              0
  - name: retroactive_cares_act_carryforward_subtraction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: Colo. Rev. Stat. § 39-22-104(4)(z)(II)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "may be carried forward to subsequent tax years as a subtraction from the taxpayer's federal taxable income until exhausted"
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: "Any subtraction must be applied first to the earliest income tax years possible"
          - path: versions[0].formula
            kind: import
            import:
              target: us-co:statutes/39/39-22-104/4/z#retroactive_cares_act_carryforward_subtraction_cap
              output: retroactive_cares_act_carryforward_subtraction_cap
              hash: sha256:local
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          min(max(0, retroactive_cares_act_subtraction_carryforward_remaining_from_earliest_income_tax_years), retroactive_cares_act_carryforward_subtraction_cap)
