format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    39-22-104(4)(t): For income tax years commencing on or after January 1, 2015, and prior to January 1, 2025, covers "compensation that would be subject to withholding under section 39-22-604" received by a nonresident individual for disaster-related work in the state during a disaster period. A disaster period extends for "sixty calendar days after the expiration" of the governor's disaster-emergency executive order. Subsection (4)(t) is repealed effective December 31, 2028.
rules:
  - name: disaster_period_extension_after_governors_executive_order_expiration
    kind: parameter
    dtype: Count
    source: 39-22-104(4)(t)(II)(B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: sixty calendar days after the expiration of the governor's executive order
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          60
  - name: nonresident_disaster_related_work_compensation_subtraction_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: 39-22-104(4)(t)(I)-(II)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: income tax years commencing on or after January 1, 2015, and prior to January 1, 2025
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: received by a nonresident individual
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: performing disaster-related work in the state during a disaster period
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: begins with the day of the governor's executive order
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: repairing, renovating, installing, building, or rendering services that relate to infrastructure
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: emergency medical, firefighting, law enforcement, hazardous material, search and rescue, or other emergency service
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          taxable_year_is_in_temporary_effective_window
          and individual_is_nonresident
          and individual_performs_the_work_in_the_state
          and work_is_performed_on_or_after_day_of_governors_executive_order_declaring_state_disaster_emergency
          and (
            governors_executive_order_declaring_state_disaster_emergency_is_unexpired_on_work_day
            or calendar_days_after_expiration_of_governors_executive_order_declaring_state_disaster_emergency <= disaster_period_extension_after_governors_executive_order_expiration
          )
          and (
            individual_repairs_renovates_installs_builds_or_renders_services_related_to_infrastructure_damaged_by_declared_state_disaster_emergency
            or individual_provides_emergency_medical_firefighting_law_enforcement_hazardous_material_search_and_rescue_or_other_emergency_service_related_to_declared_state_disaster_emergency
          )
  - name: nonresident_disaster_related_work_compensation_subtraction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: USD
    source: 39-22-104(4)(t)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: compensation that would be subject to withholding under section 39-22-604
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: received by a nonresident individual for performing disaster-related work in the state during a disaster period
          - path: versions[0].formula
            kind: effective_period
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
              excerpt: on or after January 1, 2015, and prior to January 1, 2025
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          if nonresident_disaster_related_work_compensation_subtraction_applies: max(0, compensation_that_would_be_subject_to_withholding_under_section_39_22_604_received_for_that_work) else: 0
