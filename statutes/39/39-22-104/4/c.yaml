    dtype: Money
    period: Year
    unit: USD
    source: 39-22-104(4)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
    versions:
