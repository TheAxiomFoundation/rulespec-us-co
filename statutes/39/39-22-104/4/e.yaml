format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: |-
    (I) The amount of any refund or credit for overpayment of income taxes imposed by this state or any other taxing jurisdiction to the extent included in gross income for federal income tax purposes but not previously allowed as a deduction for Colorado income tax purposes.
    (II) The purpose is to avoid re-taxing a taxpayer's state income tax refund.
    (III) Effectiveness is measured by the number of taxpayers claiming the subtraction and the total amount of state refunds claimed as subtractions.
rules:
  - name: income_tax_overpayment_refund_or_credit_subtraction
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: C.R.S. § 39-22-104(4)(e)(I)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: us-co/statute/39/39-22-104
    versions:
      - effective_from: '1989-01-01'
        formula: |-
          max(0, income_tax_overpayment_refund_or_credit_amount_included_in_federal_gross_income_and_not_previously_allowed_as_colorado_income_tax_deduction)
