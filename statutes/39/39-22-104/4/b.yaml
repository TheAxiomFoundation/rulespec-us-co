format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: "\xA7 39-22-104(4)(b): \"To the extent included in federal adjusted gross\
    \ income,\" the covered amount is \"the portion of any gain or loss from the sale\
    \ or other disposition of property\" with \"a higher adjusted basis for Colorado\
    \ income tax purposes than for federal income tax purposes\" that \"does not exceed\
    \ such difference in basis.\""
rules:
- name: higher_colorado_adjusted_basis_difference
  kind: derived
  entity: Asset
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-104(4)(b), basis difference clause
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: higher adjusted basis for Colorado income tax purposes than for
            federal income tax purposes
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: such difference in basis
  versions:
  - effective_from: '1989-01-01'
    formula: max(0, colorado_income_tax_adjusted_basis_on_disposition_date - federal_income_tax_adjusted_basis_on_disposition_date)
- name: higher_colorado_basis_property_disposition_gain_or_loss_subtraction
  kind: derived
  entity: Asset
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-104(4)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: To the extent included in federal adjusted gross income
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: from the sale or other disposition of property
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: in a transaction in which gain or loss was recognized for purposes
            of federal income tax
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: that does not exceed such difference in basis
  versions:
  - effective_from: '1989-01-01'
    formula: 'if gain_or_loss_from_transaction_recognized_for_federal_income_tax:
      min(max(0, gain_or_loss_amount_from_sale_or_other_disposition_included_in_federal_adjusted_gross_income),
      higher_colorado_adjusted_basis_difference) else: 0'
