format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: "\xA7 39-22-104(4)(m): For income tax years commencing on or after January\
    \ 1, 2001, an individual claiming the basic standard deduction, and therefore\
    \ unable to claim an itemized charitable-contribution deduction, may subtract\
    \ the amount of the charitable-contribution deduction based on aggregate charitable\
    \ contributions in excess of five hundred dollars that the individual could have\
    \ claimed if the individual had not claimed the basic standard deduction. For\
    \ income tax years commencing on or after January 1, 2015, but before January\
    \ 1, 2020, an individual claiming the \xA7 39-22-536 hunger-relief food-contribution\
    \ credit may not claim this deduction for that food contribution."
rules:
- name: charitable_contribution_subtraction_floor
  kind: parameter
  dtype: Money
  unit: USD
  source: 39-22-104(4)(m)(I)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: charitable contributions in excess of five hundred dollars
  versions:
  - effective_from: '2001-01-01'
    formula: '500'
- name: standard_deduction_charitable_contribution_subtraction
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: USD
  source: 39-22-104(4)(m)(I), (VII)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: effective_period
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: For any income tax year commencing on or after January 1, 2001
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: claims the basic standard deduction allowed under section 63 (c)(2)
            of the internal revenue code
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: therefore, cannot claim an itemized deduction for charitable contributions
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: an amount equal to the amount of any deduction based upon the aggregate
            amount of charitable contributions in excess of five hundred dollars
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: may not claim the deduction set forth in this paragraph (m) for
            the food contribution to the hunger-relief charitable organization
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: us-co/statute/39/39-22-104
          excerpt: five hundred dollars
  versions:
  - effective_from: '2001-01-01'
    formula: "if individual_claims_basic_standard_deduction_on_federal_return and\
      \ individual_cannot_claim_itemized_charitable_contributions_because_basic_standard_deduction_claimed:\n\
      \  if taxable_year_in_hunger_relief_food_contribution_credit_disallowance_window\
      \ and individual_claims_hunger_relief_food_contribution_credit:\n    max(0,\
      \ charitable_contribution_deduction_individual_could_have_claimed_if_itemized\
      \ - charitable_contribution_subtraction_floor - hunger_relief_food_contribution_amount_included_in_potential_charitable_contribution_deduction)\n\
      \  else:\n    max(0, charitable_contribution_deduction_individual_could_have_claimed_if_itemized\
      \ - charitable_contribution_subtraction_floor)\nelse:\n  0"
