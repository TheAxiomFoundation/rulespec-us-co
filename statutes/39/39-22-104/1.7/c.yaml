format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-104
  summary: (1.7)(c) Except as otherwise provided in section 39-22-627, subject to
    subsection (2) of this section, with respect to taxable years commencing on or
    after January 1, 2022, a tax of four and forty one-hundredths percent is imposed
    on the federal taxable income, as determined pursuant to section 63 of the internal
    revenue code, of every individual, estate, and trust.
  deferred_outputs:
  - output: us-co:statutes/39/39-22-104/1.7/c#individual_estate_trust_income_tax
    reason: The final imposed tax amount depends on federal taxable income as determined
      under IRC section 63, the subsection (2) modifications in subsections (3) and
      (4), and the exception in section 39-22-627; those cited computations are not
      available as copied executable context, and estate and trust entities are not
      supported here.
    source_values:
    - us-co:statutes/39/39-22-104/1.7/c#individual_estate_trust_income_tax_rate
