      \ and taxpayer_files_single_return and federal_adjusted_gross_income > single_return_high_income_lower_threshold\
      \ and federal_adjusted_gross_income <= single_return_high_income_upper_threshold:\n\
      \      high_income_child_credit_amount\n    else:\n      if taxpayers_are_resident_individuals\
      \ and taxpayers_file_joint_return and federal_adjusted_gross_income <= joint_return_low_income_upper_threshold:\n\
      \        low_income_child_credit_amount\n      else:\n        if taxpayers_are_resident_individuals\
      \ and taxpayers_file_joint_return and federal_adjusted_gross_income > joint_return_middle_income_lower_threshold\
      \ and federal_adjusted_gross_income <= joint_return_middle_income_upper_threshold:\n\
      \          middle_income_child_credit_amount\n        else:\n          if taxpayers_are_resident_individuals\
      \ and taxpayers_file_joint_return and federal_adjusted_gross_income > joint_return_high_income_lower_threshold\
      \ and federal_adjusted_gross_income <= joint_return_high_income_upper_threshold:\n\
      \            high_income_child_credit_amount\n          else:\n            0"
