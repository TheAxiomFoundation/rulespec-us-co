    formula: "if taxpayer_is_resident_individual and taxpayer_files_single_return\
      \ and federal_adjusted_gross_income <= single_return_low_income_upper_threshold:\n\
      \  low_income_child_credit_amount\nelse:\n  if taxpayer_is_resident_individual\
      \ and taxpayer_files_single_return and federal_adjusted_gross_income > single_return_middle_income_lower_threshold\
