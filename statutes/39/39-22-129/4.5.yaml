format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us-co/statute/39/39-22-129
  summary: For income tax years commencing on or after January 1, 2024, a resident
    individual filing a single return, or two resident individuals filing a joint
    return, are allowed a child tax credit for each eligible child in stated amounts
    based on federal adjusted gross income; no credit is allowed above $75,000 for
    single filers or $85,000 for joint filers.
rules:
