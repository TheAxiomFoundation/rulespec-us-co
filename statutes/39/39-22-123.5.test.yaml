    us-co:statutes/39/39-22-123.5#regular_federal_return_eitc_branch_refundable_excess: 200
    us-co:statutes/39/39-22-123.5#regular_federal_return_eitc_branch_excluded_from_public_benefit_income_or_resources: 500
    us-co:statutes/39/39-22-123.5#missing_valid_ssn_eitc_branch_before_part_year_apportionment: 0
