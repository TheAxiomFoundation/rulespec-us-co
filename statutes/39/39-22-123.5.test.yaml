    us-co:statutes/39/39-22-123.5#input.state_income_taxes_due_under_article_22: 300
  output:
    us-co:statutes/39/39-22-123.5#revenue_growth_adjustment_percentage_points: 0
    us-co:statutes/39/39-22-123.5#credit_percentage_after_revenue_adjustment: 0.5
