format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels
  summary: |-
    State Medicaid, CHIP and BHP Income Eligibility Standards (For selected MAGI Groups, based on state decisions as of December 1, 2023) ... Colorado 142% 142% 142% 260% 195% 260% 68% 133%. The MAGI-based rules generally include adjusting an individual’s income by an amount equivalent to a 5% FPL disregard.
