format: rulespec/v1
module:
  kind: composition
  summary: |-
    Colorado SNAP FY 2026 benefit calculation composition. This module imports
    the federal USDA FY 2026 maximum allotment and deduction parameters and
    income eligibility standards,
    the federal 7 USC 2017(a) regular allotment formula, federal 7 CFR
    273.10(e) income and benefit-level mechanics, and Colorado manual sections
    for countable income, income limits, resources, deductions, shelter,
    eligibility, and allotments so final allotment tests exercise the composed
    RuleSpec module rather than stubbing SNAP gross income, net income,
    eligibility, or upstream allotment values. For boarder cost
    calculations, the composed maximum allotment bridge uses the USDA
    household-size table for 1 through 8 boarders and the USDA additional
    member amount above 8 boarders.
  source_verification:
    corpus_citation_path: us/guidance/usda/fns/snap-fy2026-cola/page-1
imports:
  - us:policies/usda/snap/fy-2026-cola/maximum-allotments
