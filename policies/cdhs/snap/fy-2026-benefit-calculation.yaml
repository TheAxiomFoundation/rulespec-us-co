rules:
  - name: max_allotment_for_number_of_boarders
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if number_of_boarders <= 0:
              0
          else:
              snap_maximum_allotment_table[max(min(number_of_boarders, 8), 1)]
              + (max(number_of_boarders - 8, 0) * snap_maximum_allotment_additional_member)
  - name: other_countable_self_employment_earned_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: snap_monthly_self_employment_income + snap_capital_goods_sale_self_employment_income
  - name: shelter_costs
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          household_shelter_costs_incurred
          + snap_standard_utility_allowance
          + snap_limited_utility_allowance
          + snap_one_utility_allowance
          + snap_individual_utility_allowance
  - name: total_household_resources_before_exclusions
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_liquid_resource_value
          + snap_non_liquid_resource_value
          + snap_real_property_resource_value
          + other_household_resource_value
  - name: snap_student_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Colorado SNAP FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: count_where(member_of_household, snap_member_student_eligible) > 0
  - name: snap_ssn_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Colorado SNAP FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: count_where(member_of_household, snap_member_ssn_requirement_eligible) > 0
  - name: snap_residency_citizenship_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Colorado SNAP FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_household_residency_eligible
          and count_where(member_of_household, snap_member_citizenship_or_alien_status_eligible) > 0
  - name: snap_work_requirement_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Colorado SNAP FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          count_where(member_of_household, snap_member_work_requirement_eligible) > 0
          and count_where(member_of_household, snap_member_work_requirement_ineligible) == 0
  - name: snap_eligible
    kind: derived
    entity: Household
    dtype: Judgment
    period: Month
    source: Colorado SNAP FY 2026 benefit calculation composition
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_income_eligible
          and snap_resource_eligible
          and snap_ssn_eligible
          and snap_work_requirement_eligible
          and snap_student_eligible
          and snap_residency_citizenship_eligible
          and not snap_resource_transfer_disqualification_applies
  - name: snap_gross_monthly_earned_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_countable_earned_income
  - name: snap_total_monthly_unearned_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_countable_unearned_income
  - name: snap_income_exclusions
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          child_support_deduction
  - name: snap_gross_monthly_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_total_gross_income
  - name: snap_monthly_household_income
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_total_gross_income
  - name: snap_allowable_monthly_dependent_care_expenses
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          dependent_care_deduction
  - name: snap_allowable_monthly_child_support_payments
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          0
  - name: snap_total_medical_expenses
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          total_medical_expenses
  - name: snap_excess_shelter_deduction
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: USD
    source: Colorado SNAP federal surface bridge
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          snap_excess_shelter_deduction_for_net_income
